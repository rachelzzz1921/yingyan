<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>鹰眼</title>
<style>
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;font-size:13px;color:#1a2b3c;width:260px;padding:14px}
h1{font-size:14px;margin:0 0 2px}
.sub{color:#7a8ba0;font-size:11px;margin-bottom:12px}
.stat{display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid #eef2f7}
.stat b{font-size:16px}
.g{color:#0a7a4b}.a{color:#b45309}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;background:#cbd5e1}
.dot.on{background:#0a7a4b}
a{display:block;margin-top:10px;color:#2563eb;text-decoration:none;font-size:12px}
</style>
</head>
<body>
<h1>🦅 鹰眼 · 开单事前提醒</h1>
<div class="sub"><span class="dot" id="dot"></span><span id="engineState">检查引擎…</span></div>
<div class="stat"><span>今日提醒</span><b id="fired">–</b></div>
<div class="stat"><span>遵从率</span><b class="g" id="heed">–</b></div>
<div class="stat"><span>萌芽拦截</span><b class="g" id="budding">–</b></div>
<div class="stat"><span>未遵从待监管</span><b class="a" id="over">–</b></div>
<a href="#" id="lnkDash">院端运营看板 →</a>
<a href="#" id="lnkTools">插件 & 小工具箱 →</a>
<a href="#" id="lnkOptions">设置(引擎地址/开关)→</a>
<script src="popup.js"></script>
</body>
</html>
