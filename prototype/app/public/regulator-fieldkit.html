<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#c8d2dc">
<title>飞检材料文件夹 · 飞检组长工作台(演示靶站)</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/plugin-host.css">
</head>
<body>
<div class="host-desk">
  <div class="host-topbar">
    <a class="back" href="/plugins.html#regulator">← 工具箱</a>
    <a class="back" href="/home.html">← 三入口</a>
    <span class="hint">演示靶站 · 仿真飞检组长笔记本上的案卷材料文件夹。进场前，鹰眼把散落的材料聚合成一份标准化行装包。</span>
  </div>

  <div class="hostwin">
    <div class="hostwin-bar">
      <div class="dots"><i class="r"></i><i class="y"></i><i class="g"></i></div>
      <span class="title">📁 飞检材料 — <span class="file" id="folderName">示范医院_2026-06</span> — 文件资源管理器</span>
      <span class="spacer"></span>
      <span class="badge" id="fileCount">6 个项目</span>
    </div>
    <div class="fx-path">🖥 桌面 › 飞检材料 › <b id="pathCase">示范医院_2026-06（案卷 main）</b></div>
    <div class="fx-list" id="fxList" style="position:relative">
      <div class="fx-item"><div class="ic">📄</div><div class="nm">病案首页.pdf</div><div class="mt">1.2 MB</div></div>
      <div class="fx-item"><div class="ic">📊</div><div class="nm">费用明细清单.xlsx</div><div class="mt">340 KB</div></div>
      <div class="fx-item"><div class="ic">🧬</div><div class="nm">病理报告.pdf</div><div class="mt">2.1 MB</div></div>
      <div class="fx-item"><div class="ic">💊</div><div class="nm">医嘱单.pdf</div><div class="mt">560 KB</div></div>
      <div class="fx-item"><div class="ic">🧾</div><div class="nm">结算数据.json</div><div class="mt">88 KB</div></div>
      <div class="fx-item"><div class="ic">🔬</div><div class="nm">检验报告.pdf</div><div class="mt">790 KB</div></div>
    </div>
    <div class="xl-status"><span id="fxStatus">案卷 main · 6 份材料 · 尚未整理成进场清单</span><span class="spacer"></span><span>就绪</span></div>
  </div>
</div>

<script src="/plugin-overlay.js"></script>
<script>
var params=new URLSearchParams(location.search);
var CASE=params.get('case_id')||'main';
function esc(v){return String(v==null?'':v).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function money(n){return Number(n||0).toLocaleString('zh-CN');}
var TIER_BG={A:'#b91c1c',B:'#d97706',C:'#0a7a4b'};

if(params.get('from')==='triage'){
  document.getElementById('fxStatus').textContent='案卷 '+CASE+'（从疑点分诊 Top1 带入）· 待聚合行装包';
}

async function fetchKit(format){
  var res=await fetch('/api/regulator/field-kit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({case_id:CASE,org_name:'示范医院',period:'2026-06',format:format})});
  if(!res.ok) throw new Error(await res.text()||('HTTP '+res.status));
  return format==='json'?res.json():res.text();
}

function aggregate(){
  var wrap=document.getElementById('fxList');
  var scan=document.createElement('div'); scan.className='host-scanline'; wrap.appendChild(scan);
  setTimeout(function(){scan.remove();},1100);
  var yy=YY.panel({title:'鹰眼 · 飞检行装包', sub:'正在读取案卷文件夹…', accent:'#0B2A4A'});
  yy.loading('正在聚合案卷 '+esc(CASE)+' 的散落材料…');
  fetchKit('json').then(function(d){
    var k=d.kit||d; render(yy,k);
  }).catch(function(e){ yy.body('<div style="padding:16px;color:#b91c1c">生成失败:'+esc(e.message)+'</div>'); });
}

function render(yy,k){
  var n=function(x){return Array.isArray(x)?x.length:0;};
  yy.sub('已读取案卷 '+esc(CASE)+' 的散落材料，聚合成标准化行装包五件套');
  yy.chips([{text:'疑点 '+n(k.suspicious_list),bg:'#b91c1c'},{text:'缺材料 '+n(k.missing_materials),bg:'#d97706'}]);
  var susp=(k.suspicious_list||[]).slice(0,3).map(function(s){var t=(s.tier||{}).code||'A';
    return '<div style="padding:8px 14px;border-bottom:1px solid #f2f5f9;border-left:4px solid '+TIER_BG[t]+'">'+
      '<div style="display:flex;align-items:center;gap:6px"><span style="background:'+TIER_BG[t]+';color:#fff;font-size:11px;font-weight:800;padding:1px 7px;border-radius:20px">'+t+'</span>'+
      '<b>'+esc(s.rule_id)+' · '+esc(s.rule_name)+'</b><span style="flex:1"></span>'+(s.amount?'<span style="font-family:monospace;color:#41556b">¥'+money(s.amount)+'</span>':'')+'</div></div>';
  }).join('');
  var ev=(k.evidence_index||[]).slice(0,3).map(function(e){
    return '<div style="padding:6px 14px;font-size:11.5px;border-bottom:1px solid #f7f9fb"><b style="color:#33475b">'+esc(e.rule_id)+' · '+esc(e.type)+'</b> <span style="color:#41556b">'+esc(e.loc)+'</span><br><span style="color:#98a6b5">'+esc(String(e.text||'').slice(0,60))+'</span></div>';
  }).join('');
  var miss=(k.missing_materials||[]).slice(0,4).map(function(m){return '<li>'+esc(m.rule_id)+'：'+esc(m.item)+'</li>';}).join('');
  yy.body(
    '<div style="padding:12px 14px;background:#f8fafc;border-bottom:1px solid #edf1f6;display:flex;gap:6px;flex-wrap:wrap">'+
      kitCard('疑点清单',n(k.suspicious_list))+kitCard('证据索引',n(k.evidence_index))+kitCard('现场任务',n(k.field_tasks))+kitCard('缺失材料',n(k.missing_materials))+kitCard('询问要点',n(k.interview_points))+
    '</div>'+
    '<div style="padding:8px 14px;font-size:12px;font-weight:700;color:#33475b;background:#fafbfc">疑点清单（前 3）</div>'+susp+
    '<div style="padding:8px 14px;font-size:12px;font-weight:700;color:#33475b;background:#fafbfc">证据索引（前 3）</div>'+ev+
    (miss?'<div style="padding:8px 14px;font-size:12px;font-weight:700;color:#b45309;background:#fffaf0">现场需调阅</div><ul style="margin:0;padding:6px 14px 10px 30px;font-size:12px;color:#5b6d82">'+miss+'</ul>':''));
  yy.actions([
    {label:'下载行装包 Markdown',kind:'primary',onClick:function(){ download(); }},
    {label:'争议项进复核',href:'/agent-chain.html?preview=appeal&case_id='+encodeURIComponent(CASE)}
  ]);
  yy.footer('复用单案稽核 + 举证包 · 换飞检输出模板 · 五个人拿到同一份口径');
  document.getElementById('fxStatus').textContent='✓ 已聚合行装包五件套 · 可下载随身带';
}
function kitCard(label,n){
  return '<div style="flex:1;min-width:60px;background:#fff;border:1px solid #e3e9f0;border-radius:8px;padding:7px 4px;text-align:center">'+
    '<div style="font-size:18px;font-weight:800;color:#0B2A4A;font-family:monospace">'+n+'</div>'+
    '<div style="font-size:10.5px;color:#7a8ba0">'+label+'</div></div>';
}
async function download(){
  try{ var md=await fetchKit('markdown');
    var blob=new Blob(['﻿'+md],{type:'text/markdown;charset=utf-8'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='飞检行装包-'+CASE+'.md'; a.click(); URL.revokeObjectURL(a.href);
  }catch(e){ alert('下载失败:'+e.message); }
}
YY.launcher({label:'鹰眼飞检助手 · 已注入', hint:'把这个案卷文件夹聚合成标准行装包', onClick:aggregate});
</script>
</body>
</html>
