<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#c8d2dc">
<title>本月疑点清单导出.xlsx · 疑点分诊插件演示靶站</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/plugin-host.css">
</head>
<body>
<div class="host-desk">
  <div class="host-topbar">
    <a class="back" href="/plugins.html#regulator">← 工具箱</a>
    <a class="back" href="/home.html">← 三入口</a>
    <span class="hint">演示靶站 · 仿真监管人员打开「智能监管子系统」导出的疑点清单 Excel。鹰眼以插件浮窗贴上来做三档粗筛，不改动你的表格软件。</span>
  </div>

  <div class="hostwin">
    <div class="hostwin-bar">
      <div class="dots"><i class="r"></i><i class="y"></i><i class="g"></i></div>
      <span class="title">📊 <span class="file">本月疑点清单导出.xlsx</span> — 表格</span>
      <span class="spacer"></span>
      <span class="badge">只读 · 虚构脱敏数据</span>
    </div>
    <div class="xl-ribbon">
      <span class="tab">文件</span><span class="tab">开始</span><span class="tab">插入</span>
      <span class="tab">公式</span><span class="tab on">数据</span><span class="tab">审阅</span><span class="tab">视图</span>
    </div>
    <div class="xl-tools">
      <span class="grp">Σ 自动求和</span>
      <span class="grp">↕ 排序</span>
      <span class="grp">▽ 筛选</span>
      <span class="grp"><b>数据来源：</b>全省智能监管子系统 · 大数据疑点下发</span>
    </div>
    <div class="xl-formula">
      <span class="xl-namebox">A1</span>
      <span class="xl-fx">fx</span>
      <span class="cell-ref">结算编号</span>
    </div>
    <div class="xl-grid-wrap" id="gridWrap" style="position:relative">
      <table class="xl">
        <colgroup>
          <col style="width:38px"><col style="width:92px"><col style="width:96px"><col style="width:88px">
          <col style="width:76px"><col><col style="width:82px"><col style="width:92px"><col style="width:132px">
        </colgroup>
        <thead>
          <tr>
            <th class="corner"></th><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th><th>F</th><th>G</th><th>H</th>
          </tr>
        </thead>
        <tbody id="xlBody">
          <tr class="head">
            <td class="rownum">1</td>
            <td class="c">结算编号</td><td class="c">结算日期</td><td class="c">科室</td><td class="c">开单医生</td>
            <td class="c">项目 / 药品名称</td><td class="c">金额(元)</td><td class="c">命中规则</td><td class="c">系统标注</td>
          </tr>
          <tr><td class="rownum">2</td><td colspan="8" class="c" style="color:#98a6b5">加载导出数据中…</td></tr>
        </tbody>
      </table>
    </div>
    <div class="xl-status">
      <span id="stCount">就绪</span>
      <span class="spacer"></span>
      <span id="stSum">求和：—</span>
      <span>100%</span>
    </div>
  </div>
</div>

<script src="/plugin-overlay.js"></script>
<script>
var DATA = null; // 缓存 screening 结果
function esc(v){return String(v==null?'':v).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function money(n){return Number(n||0).toLocaleString('zh-CN');}
function tierOf(h){ return (h.nature==='可疑'||h.rule_id==='QTY-901') ? 'B' : 'A'; }
var TIER_LABEL={A:'建议重点核查',B:'建议补材料后核查',C:'建议暂缓 / 观察'};
var TIER_BG={A:'#b91c1c',B:'#d97706',C:'#0a7a4b'};

// 1) 载入导出数据，填进 Excel（系统只给"疑点·待分诊"，还没有优先级）
async function loadSheet(){
  try{
    DATA = await fetch('/api/screening/run').then(function(r){return r.json();});
    if(DATA.error) throw new Error(DATA.error);
  }catch(e){
    document.getElementById('xlBody').innerHTML='<tr><td class="rownum">2</td><td colspan="8" class="c" style="color:#b91c1c">读取失败:'+esc(e.message)+' —— 请确认本地引擎已启动</td></tr>';
    return;
  }
  var rows = (DATA.top20||[]).slice(0,14);
  var body = document.getElementById('xlBody');
  body.querySelectorAll('tr:not(.head)').forEach(function(t){t.remove();});
  rows.forEach(function(h,i){
    var tr=document.createElement('tr');
    tr.id='xlrow-'+esc(h.row_id);
    tr.innerHTML='<td class="rownum">'+(i+2)+'</td>'+
      '<td class="c mono">'+esc(h.row_id)+'</td>'+
      '<td class="c mono">'+esc(h.settle_date)+'</td>'+
      '<td class="c">'+esc(h.dept)+'</td>'+
      '<td class="c">'+esc(h.doctor)+'</td>'+
      '<td class="c">'+esc(h.item_name)+'</td>'+
      '<td class="c num">'+money(h.amount)+'</td>'+
      '<td class="c mono">'+esc(h.rule_id)+'</td>'+
      '<td class="c" id="yytag-'+esc(h.row_id)+'" style="color:#98a6b5">疑点 · 待分诊</td>';
    body.appendChild(tr);
  });
  var f=DATA.funnel||{};
  document.getElementById('stCount').textContent='就绪 · 共 '+money(f.total_rows)+' 条疑点(表内示前 '+rows.length+' 行)';
  document.getElementById('stSum').textContent='命中金额求和：¥'+money(f.hit_amount);
  // 插件"已注入"入口
  YY.launcher({ label:'鹰眼监管助手 · 已注入', hint:'点此对当前疑点清单做三档粗筛', onClick:runTriage });
}

// 2) 点插件 → 扫描线 → 浮窗出三档 + 把优先级写回表格
function runTriage(){
  var wrap=document.getElementById('gridWrap');
  var scan=document.createElement('div'); scan.className='host-scanline'; wrap.appendChild(scan);
  setTimeout(function(){scan.remove();},1100);
  var yy=YY.panel({ title:'鹰眼 · 疑点分诊', sub:'正在读取当前表格…', accent:'#DC4A3D' });
  yy.loading('正在粗筛 '+money((DATA.funnel||{}).total_rows)+' 条疑点…');
  setTimeout(function(){ renderResult(yy); }, 900);
}

function renderResult(yy){
  var f=DATA.funnel||{}, g=DATA.ground_truth_check||{};
  var rows=(DATA.top20||[]).slice(0,14);
  var a=0,b=0;
  rows.forEach(function(h){ var t=tierOf(h); if(t==='A')a++; else b++;
    var tr=document.getElementById('xlrow-'+h.row_id); var tag=document.getElementById('yytag-'+h.row_id);
    if(tr){ tr.querySelectorAll('td.c').forEach(function(td){td.classList.add.apply(td.classList,[]);}); tr.classList.add(t==='A'?'hit-a':'hit-b'); }
    if(tag){ tag.innerHTML='<b style="color:'+TIER_BG[t]+'">'+(t==='A'?'🔴 A 重点核查':'🟡 B 补材料')+'</b>'; }
  });
  yy.sub('读取到 '+money(f.total_rows)+' 条疑点,已按核查优先级粗筛成三档');
  yy.chips([{text:'A 重点 '+f.by_nature['明确违规'],bg:'#b91c1c'},{text:'B 补材料 '+f.by_nature['可疑'],bg:'#d97706'},{text:'C 暂缓 '+money(f.clean_rows),bg:'#0a7a4b'}]);
  // 漏斗 + Top 列表
  var top=rows.slice(0,6).map(function(h){var t=tierOf(h);
    return '<div style="padding:9px 14px;border-bottom:1px solid #f2f5f9;border-left:4px solid '+TIER_BG[t]+'">'+
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">'+
        '<span style="background:'+TIER_BG[t]+';color:#fff;font-size:11px;font-weight:800;padding:1px 7px;border-radius:20px">'+t+'</span>'+
        '<b>'+esc(h.rule_id)+' · '+esc(h.item_name)+'</b>'+
        '<span style="flex:1"></span><span style="font-family:monospace;color:#41556b">¥'+money(h.amount)+'</span></div>'+
      '<div style="font-size:11.5px;color:#5b6d82;line-height:1.5">'+esc(h.reason)+'</div></div>';
  }).join('');
  yy.body(
    '<div style="padding:12px 14px 6px;background:#f8fafc;border-bottom:1px solid #edf1f6">'+
      '<div style="display:flex;gap:8px">'+
        funnelCard('重点核查', f.by_nature['明确违规'], '#b91c1c')+
        funnelCard('补材料', f.by_nature['可疑'], '#d97706')+
        funnelCard('暂缓/观察', money(f.clean_rows), '#0a7a4b')+
      '</div>'+
      '<div style="font-size:11.5px;color:#0a7a4b;margin-top:8px">✓ 已把三档优先级写回表格 H 列 · 真值误报 '+esc(g.false_positives)+'/'+esc(g.embedded)+'（G0 干净行零误报）</div>'+
    '</div>'+top);
  yy.actions([
    {label:'生成上会清单',kind:'primary',onClick:function(){ downloadList(rows); }},
    {label:'Top1 飞检行装包',href:'/regulator-fieldkit.html?from=triage&case_id=main'}
  ]);
  yy.footer('L1 确定性·毫秒级 · 本地运行,数据不出机 · AI 提供线索支持,最终由监管人员裁定');
}
function funnelCard(label,n,color){
  return '<div style="flex:1;background:#fff;border:1px solid #e3e9f0;border-radius:8px;padding:8px 10px;text-align:center">'+
    '<div style="font-size:20px;font-weight:800;color:'+color+';font-family:monospace">'+esc(n)+'</div>'+
    '<div style="font-size:11px;color:#7a8ba0">'+esc(label)+'</div></div>';
}
function downloadList(rows){
  var lines=['档位\t结算编号\t科室\t项目\t金额\t命中规则\t分档依据'];
  rows.forEach(function(h){var t=tierOf(h); lines.push([t,h.row_id,h.dept,h.item_name,h.amount,h.rule_id,h.reason].join('\t'));});
  var blob=new Blob(['﻿'+lines.join('\n')],{type:'text/tab-separated-values;charset=utf-8'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='疑点分诊-上会清单.tsv'; a.click(); URL.revokeObjectURL(a.href);
}
loadSheet();
</script>
</body>
</html>
