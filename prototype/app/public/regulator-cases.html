<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#F0F4F8">
<title>判例速查卡 · 鹰眼监管小工具箱</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/toolkit.css">
<style>
.query{display:grid;grid-template-columns:1fr auto;gap:10px}
@media(max-width:680px){.query{grid-template-columns:1fr}}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.chip{border:1px solid var(--line);border-radius:999px;background:#F8FAFC;color:var(--ink2);font-weight:800;font-size:12.5px;padding:6px 13px;cursor:pointer;font-family:inherit}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.case{border:1px solid var(--line);border-radius:12px;background:#F8FAFC;padding:14px;margin-top:10px}
.case h2{font-size:16px;margin-bottom:5px}
.case p{color:var(--muted);font-size:13px;margin-top:6px}
.tag{display:inline-flex;border-radius:999px;background:#FFF7E6;color:#8F6210;padding:3px 9px;font-weight:800;font-size:11px;margin-right:6px}
.tag.status{background:#EAFBF8;color:#0E756A}
.tag.date{background:#EEF2F7;color:var(--muted)}
</style>
</head>
<body>
<main class="wrap">
  <header class="top">
    <div>
      <div class="eyebrow">REGULATOR TOOLKIT · CASES</div>
      <h1>📚 判例速查卡</h1>
      <p class="lead">从公开曝光台案例库检索同类案例，只作公开案例参照和历史处理区间提示——不给裁量建议、不给罚款倍数，最终由监管人员结合事实与程序判断。</p>
    </div>
    <div class="top-nav">
      <a class="back" href="/plugins.html#regulator">← 工具箱</a>
      <a class="back" href="/home.html">← 三入口</a>
    </div>
  </header>
  <p class="crumb"><a href="/home.html">三入口</a> → <a href="/plugins.html#regulator">③ 插件 & 小工具箱</a> → <b>判例速查卡</b></p>

  <nav class="mode">
    <button data-mode="use">⚡ 直接使用</button>
    <button data-mode="sc">🎬 模拟场景</button>
  </nav>

  <!-- ============ 直接使用 ============ -->
  <div id="pane-use">
  <section class="panel" style="margin-top:0">
    <div class="query">
      <input class="input" id="q" value="回流药" aria-label="违规类型关键词">
      <button class="btn primary" id="search" type="button">检索</button>
    </div>
    <div class="chips" id="chips">
      <button class="chip" data-q="">全部</button>
      <button class="chip on" data-q="回流药">回流药</button>
      <button class="chip" data-q="虚记费用">虚记费用</button>
      <button class="chip" data-q="欺诈骗保">欺诈骗保</button>
      <button class="chip" data-q="耗材">高值耗材</button>
      <button class="chip" data-q="分解住院">分解住院</button>
    </div>
    <div class="note">边界：本页只展示公开案例参照、历史处理区间和核验状态，避免把案例检索包装成自动化处理意见。每条来源可溯（官方通报 / 已核验媒体报道）。</div>
  </section>
  <section class="panel" id="results"><p class="muted">输入关键词或点类型筛选后检索公开案例。</p></section>
  </div>

  <!-- ============ 模拟场景 ============ -->
  <div id="pane-sc" class="hidden"><div id="scPlayer"></div></div>
</main>

<script src="/toolkit.js"></script>
<script>
const $ = TK.$;
async function apiSearch(q) {
  const r = await fetch('/api/regulator/exposure-cases?q=' + encodeURIComponent(q || '')).then(x => x.json());
  if (r.error) throw new Error(r.error);
  return r;
}
function caseCard(c) {
  return `<article class="case">
    <h2>${TK.esc(c.case_id)}</h2>
    <span class="tag">${TK.esc(c.violation_type)}</span><span class="tag status">${TK.esc(c.verify_status)}</span><span class="tag date">${TK.esc(c.date || '')}${c.specialty ? ' · ' + TK.esc(c.specialty) : ''}</span>
    <p><b>机构类型：</b>${TK.esc(c.org_type || '—')}</p>
    <p><b>行为摘要：</b>${TK.esc(c.behavior)}</p>
    <p><b>历史处理区间：</b>${TK.esc(c.outcome)}</p>
    <p><b>依据：</b>${TK.esc((c.law_refs || []).join(' / '))}</p>
    <p><b>来源：</b>${TK.esc(c.source)}</p>
  </article>`;
}
async function search(q) {
  const query = q != null ? q : $('#q').value.trim();
  $('#results').innerHTML = '<p class="muted">检索中…</p>';
  try {
    const r = await apiSearch(query);
    $('#results').innerHTML = `
      <p class="muted">检索到 ${TK.esc(r.count)} 条。${TK.esc(r.note)}</p>
      ${(r.cases || []).map(caseCard).join('') || '<p class="muted">未找到匹配案例。</p>'}`;
  } catch (e) {
    $('#results').innerHTML = `<p class="muted">检索失败：${TK.esc(e.message)}</p>`;
  }
}
$('#search').addEventListener('click', () => search());
$('#q').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
for (const chip of document.querySelectorAll('.chip')) {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
    chip.classList.add('on');
    $('#q').value = chip.dataset.q;
    search(chip.dataset.q);
  });
}

/* ---------- 模拟场景：证据够不够、别人怎么处理 ---------- */
TK.scenario({
  mount: '#scPlayer',
  role: '处罚承办人 · 老魏',
  where: '周三 16:00 · 法制科 · 案件呈批表写到一半',
  text: '飞检移交回来一个回流药案子，呈批表要写「同类案例处理情况」。老魏关心两件事：证据链够不够立得住，公开的同类案子历史上怎么处理的。判例速查卡只给参照，不替他做裁量。',
  steps: [
    {
      id: 'search', title: '搜同类公开案例', sub: 'exposure_cases · 全部已核验来源', btn: '搜「回流药」',
      say: '这里每条都是国家医保局或地方局公开通报过的案例，带核验状态和来源链接——不是 AI 编的。',
      run: async (ctx) => {
        ctx.r = await apiSearch('回流药');
        return `<p class="msg ok">✓ 检索到 ${ctx.r.count} 条已核验同类案例。</p>` + (ctx.r.cases || []).slice(0, 1).map(caseCard).join('');
      },
    },
    {
      id: 'range', title: '看历史处理区间', sub: '公开案例参照 · 不作裁量建议', btn: '提取处理区间',
      say: '注意措辞：我们展示的是「历史处理区间」，不是「建议罚款倍数」。裁量是人的职权，工具只负责把参照材料递到手边。',
      run: async (ctx) => {
        if (!ctx.r) throw new Error('请先执行第 1 步');
        const outcomes = (ctx.r.cases || []).map(c => `<div class="tier c" style="margin-bottom:8px"><b>${TK.esc(c.case_id)}</b><span>${TK.esc(c.outcome)}</span></div>`).join('');
        return outcomes + '<div class="note">呈批表引用格式：案例编号 + 通报日期 + 来源。最终处理由监管人员结合本案事实与程序独立判断。</div>';
      },
    },
  ],
  finale: {
    text: '参照找齐、来源可溯，呈批表附件半小时搞定。回到工具箱看全家福。',
    next: { label: '返回插件 & 小工具箱', href: '/plugins.html#regulator' },
  },
});
</script>
</body>
</html>
