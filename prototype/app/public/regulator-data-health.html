<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#c8d2dc">
<title>医院报送月表.xlsx · 数据体检(演示靶站)</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/plugin-host.css">
<link rel="stylesheet" href="/plugin-import.css">
</head>
<body>
<div class="host-desk">
  <div class="host-topbar">
    <a class="back" href="/plugins.html#regulator">← 工具箱</a>
    <a class="back" href="/home.html">← 三入口</a>
    <span class="hint">演示靶站 · 仿真信息科收到医院报送的月表 Excel。进疑点分诊前先体检——脏数据进引擎只会产出脏线索。鹰眼以插件浮窗查字段缺失 / 格式 / 孤儿行。</span>
  </div>

  <div class="hostwin">
    <div class="hostwin-bar">
      <div class="dots"><i class="r"></i><i class="y"></i><i class="g"></i></div>
      <span class="title">📊 <span class="file">示范医院_2026-06_报送月表.xlsx</span> — 表格</span>
      <span class="spacer"></span><span class="badge">医院报送 · 待校验</span>
    </div>
    <div class="xl-ribbon"><span class="tab">文件</span><span class="tab on">开始</span><span class="tab">插入</span><span class="tab">数据</span><span class="tab">审阅</span></div>
    <div class="xl-formula"><span class="xl-namebox">A1</span><span class="xl-fx">fx</span><span class="cell-ref">项目名称</span></div>
    <div id="yyImportHealth"></div>
    <div class="xl-grid-wrap" id="gridWrap" style="position:relative">
      <table class="xl">
        <colgroup><col style="width:38px"><col><col style="width:70px"><col style="width:70px"><col style="width:70px"><col style="width:90px"><col style="width:96px"><col style="width:88px"><col style="width:180px"></colgroup>
        <thead><tr><th class="corner"></th><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th><th>F</th><th>G</th><th>H</th></tr></thead>
        <tbody id="xlBody"></tbody>
      </table>
    </div>
    <div class="xl-status"><span id="stCount">医院报送月表 · 待体检</span><span class="spacer"></span><span>100%</span></div>
  </div>
</div>

<script src="/plugin-overlay.js"></script>
<script>
function esc(v){return String(v==null?'':v).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
// 报送月表（含故意的质量问题）：表头 + 数据行
var HEADER=['项目名称','年龄','性别','数量','金额','科室','医生','追溯码'];
var ROWS=[
  ['左氧氟沙星注射液','16','男','1','120','儿科','李医生',''],
  ['静脉输液','40','女','35','280','内科','王医生',''],
  ['','60','女','2','90','内科','王医生','85907831160000000214'],
  ['阿托伐他汀钙片','','','1','100','','张医生','85907831160000000214'],
  ['血常规','28','男','1','25','检验科','钱医生',''],
  ['头孢呋辛酯片','200','女','abc','65','外科','赵医生','X8]'],
];
function renderSheet(){
  var b=document.getElementById('xlBody');
  b.innerHTML='<tr class="head"><td class="rownum">1</td>'+HEADER.map(function(h){return '<td class="c">'+esc(h)+'</td>';}).join('')+'</tr>'+
    ROWS.map(function(r,i){return '<tr id="dhrow-'+i+'"><td class="rownum">'+(i+2)+'</td>'+r.map(function(c){return '<td class="c'+(/^\d+$/.test(c)?' num':'')+'">'+esc(c)+'</td>';}).join('')+'</tr>';}).join('');
  document.getElementById('stCount').textContent='医院报送月表 · '+ROWS.length+' 行 · 待体检';
}
// 体检逻辑（纯前端）
function analyze(){
  var col={item_name:0,patient_age:1,patient_sex:2,qty:3,amount:4,dept:5,doctor:6,trace:7};
  var missing=[]; // 表头都在，这里演示字段完整；真实缺列时会检出
  var fmt=[], orphan=[], seen={};
  ROWS.forEach(function(r,i){
    var ln=i+2;
    if(r[1] && (!/^\d+$/.test(r[1])||+r[1]>120)) fmt.push('第 '+ln+' 行：年龄格式/范围异常（'+r[1]+'）');
    if(r[3] && !/^\d+$/.test(r[3])) fmt.push('第 '+ln+' 行：数量非数字（'+r[3]+'）');
    if(r[7]){ if(!/^[0-9A-Za-z]{12,32}$/.test(r[7])) fmt.push('第 '+ln+' 行：追溯码格式异常');
      if(seen[r[7]]) fmt.push('第 '+ln+' 行：追溯码与第 '+seen[r[7]]+' 行重复'); else seen[r[7]]=ln; }
    var hasAmt=!!r[4], noItem=!r[0], noWho=!r[5]&&!r[6];
    if(hasAmt&&(noItem||noWho)) orphan.push(ln);
  });
  return {missing:missing, fmt:fmt, orphan:orphan};
}
function check(){
  var wrap=document.getElementById('gridWrap');
  var scan=document.createElement('div'); scan.className='host-scanline'; wrap.appendChild(scan);
  setTimeout(function(){scan.remove();},1100);
  var yy=YY.panel({title:'鹰眼 · 数据体检', sub:'正在读取报送月表…', accent:'#134E72'});
  yy.loading('体检字段 / 格式 / 孤儿行…');
  setTimeout(function(){
    var a=analyze();
    // 高亮问题行
    a.orphan.forEach(function(ln){var tr=document.getElementById('dhrow-'+(ln-2)); if(tr) tr.classList.add('hit-a');});
    var total=a.missing.length+a.fmt.length+a.orphan.length;
    yy.sub(total?('体检发现 '+total+' 处质量问题，建议退回补报'):'报送数据合格，可进疑点分诊');
    yy.chips([{text:'格式 '+a.fmt.length,bg:a.fmt.length?'#d97706':'#0a7a4b'},{text:'孤儿行 '+a.orphan.length,bg:a.orphan.length?'#b91c1c':'#0a7a4b'}]);
    yy.body(
      '<div style="padding:12px 14px;background:#f8fafc;border-bottom:1px solid #edf1f6;display:flex;gap:8px">'+
        dcard('字段缺失',a.missing.length)+dcard('编码/格式',a.fmt.length)+dcard('孤儿行',a.orphan.length)+
      '</div>'+
      issue('1. 字段缺失',a.missing,'均已识别')+
      issue('2. 编码格式',a.fmt,'未见明显异常')+
      issue('3. 孤儿行',a.orphan.map(function(l){return '第 '+l+' 行：有金额但缺项目名或科室/医生归属';}),'未发现')
    );
    yy.actions([
      {label:total?'导出问题清单退回医院':'合格·送疑点分诊',kind:'primary',onClick:function(){ yy.close(); }},
      {label:'去疑点分诊',href:'/regulator-triage.html'}
    ]);
    yy.footer('纯本机校验 · 数据不出机 · 只提示数据质量，不做稽核认定');
  },900);
}
function dcard(label,n){return '<div style="flex:1;background:#fff;border:1px solid #e3e9f0;border-radius:8px;padding:8px;text-align:center"><div style="font-size:20px;font-weight:800;font-family:monospace;color:'+(n?'#b91c1c':'#0a7a4b')+'">'+n+'</div><div style="font-size:11px;color:#7a8ba0">'+label+'</div></div>';}
function issue(title,arr,okText){
  var hot=arr.length;
  return '<div style="padding:8px 14px;border-left:4px solid '+(hot?'#d97706':'#0a7a4b')+';margin:0"><b style="font-size:12.5px">'+title+'</b>'+
    (hot?'<ul style="margin:4px 0 0;padding-left:18px;font-size:12px;color:#5b6d82">'+arr.map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+'</ul>':'<div style="font-size:12px;color:#0a7a4b;margin-top:2px">'+okText+'</div>')+'</div>';
}
renderSheet();
YY.launcher({label:'鹰眼体检助手 · 已注入', hint:'报送进引擎前先体检数据质量', onClick:check});
</script>
<script src="/plugin-import.js"></script>
<script>
YingyanPluginImport.mount('#yyImportHealth', {
  hint: '拖入医院报送 CSV/Excel · 覆盖演示月表后点右下角体检',
  onImport: function (payload) {
    if (payload.kind !== 'table' || !payload.table.rows.length) return;
    var h = payload.table.headers;
    HEADER = h.slice();
    ROWS = payload.table.rows.map(function (row) {
      return h.map(function (col) { return row[col] != null ? String(row[col]) : ''; });
    });
    renderSheet();
    document.getElementById('stCount').textContent = '已导入报送月表 · ' + ROWS.length + ' 行 · 待体检';
  },
  onImage: function () {
    var el = document.querySelector('#yyImportHealth .yy-import-status');
    if (el) { el.innerHTML = '扫描件已接收 · <a href="/intake.html" target="_blank" style="color:#134E72">材料导入中心 OCR →</a>'; el.className = 'yy-import-status show'; }
  }
});
</script>
</body>
</html>
