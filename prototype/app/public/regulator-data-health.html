<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#F0F4F8">
<title>数据体检哨兵 · 鹰眼监管小工具箱</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/toolkit.css">
<style>
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:12px}
@media(max-width:780px){.cards{grid-template-columns:1fr 1fr}}
.issue{border:1px solid var(--line);border-left:5px solid var(--amber);border-radius:12px;background:#F8FAFC;padding:12px;margin-top:10px}
.issue.hot{border-left-color:var(--red)}
.issue.ok{border-left-color:var(--iris2)}
.issue h2{font-size:16px}
.issue p,.issue li{font-size:13px;color:var(--muted)}
ul{padding-left:18px}
</style>
</head>
<body>
<main class="wrap">
  <header class="top">
    <div>
      <div class="eyebrow">REGULATOR TOOLKIT · DATA HEALTH</div>
      <h1>🧾 数据体检哨兵</h1>
      <p class="lead">医院报送 Excel 的复制粘贴快检：字段缺失、编码格式、孤儿行。数据先体检、再进疑点分诊——脏数据进引擎只会产出脏线索。只提示数据质量问题，不做稽核认定。</p>
    </div>
    <div class="top-nav">
      <a class="back" href="/plugins.html#regulator">← 工具箱</a>
      <a class="back" href="/home.html">← 三入口</a>
    </div>
  </header>
  <p class="crumb"><a href="/home.html">三入口</a> → <a href="/plugins.html#regulator">③ 插件 & 小工具箱</a> → <b>数据体检哨兵</b></p>

  <nav class="mode">
    <button data-mode="use">⚡ 直接使用</button>
    <button data-mode="sc">🎬 模拟场景</button>
  </nav>

  <!-- ============ 直接使用 ============ -->
  <div id="pane-use">
  <section class="panel" style="margin-top:0">
    <textarea class="input" id="raw" aria-label="报送表 TSV 或 CSV">项目名称	年龄	性别	数量	金额	科室	医生	追溯码
左氧氟沙星注射液	16	男	1	120	儿科	李医生
静脉输液	40	女	35	280	内科	王医生
	60	女	2	90	内科	王医生	85907831160000000214
阿托伐他汀钙片			1	100		张医生	85907831160000000214</textarea>
    <div class="actions" style="margin-top:12px">
      <button class="btn primary" type="button" id="check">开始体检</button>
      <button class="btn ghost" type="button" id="demo">载入演示表</button>
      <a class="btn" href="/regulator-triage.html">体检通过 → 送疑点分诊</a>
    </div>
    <div class="note">支持从 Excel 直接复制的 TSV，也兼容简单 CSV。生产版可接上传解析；当前版本零依赖、纯本机校验，数据不出机。</div>
  </section>

  <section class="panel" id="result">
    <p class="muted">点「开始体检」查看字段缺失、编码格式、孤儿行三类数据质量问题。</p>
  </section>
  </div>

  <!-- ============ 模拟场景 ============ -->
  <div id="pane-sc" class="hidden"><div id="scPlayer"></div></div>
</main>

<script src="/toolkit.js"></script>
<script>
const $ = TK.$;
const REQUIRED = [
  ['item_name', /项目名称|项目|名称|收费项目|药品名称|诊疗项目|品名/],
  ['patient_age', /年龄|患者年龄/],
  ['patient_sex', /性别/],
  ['qty', /数量|次数/],
  ['amount', /金额|费用|合计/],
  ['dept', /科室|开单科室/],
  ['doctor', /医生|医师/],
];
const TRACE_RE = /^[0-9A-Za-z]{12,32}$/;
function splitLine(line, sep) {
  if (sep === '\t') return line.split('\t');
  return line.split(',').map(x => x.replace(/^"|"$/g, '').trim());
}
function parseTable(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return { header: [], rows: [], sep: '\t' };
  const sep = lines[0].includes('\t') ? '\t' : ',';
  return { header: splitLine(lines[0], sep), rows: lines.slice(1).map(l => splitLine(l, sep)), sep };
}
function analyze(text) {
  const { header, rows } = parseTable(text);
  const col = {};
  for (const [field, re] of REQUIRED) {
    const idx = header.findIndex(h => re.test(h));
    if (idx >= 0) col[field] = idx;
  }
  const missing = REQUIRED.filter(([field]) => col[field] == null).map(([field]) => field);
  const emptyStats = Object.entries(col).map(([field, idx]) => ({
    field,
    empty: rows.filter(r => !String(r[idx] ?? '').trim()).length,
  })).filter(x => x.empty > 0);
  const formatIssues = [];
  rows.forEach((r, i) => {
    const lineNo = i + 2;
    if (col.patient_age != null) {
      const v = String(r[col.patient_age] ?? '').trim();
      if (v && (!/^\d+(\.\d+)?$/.test(v) || Number(v) < 0 || Number(v) > 120)) formatIssues.push(`第 ${lineNo} 行：年龄格式异常`);
    }
    if (col.qty != null) {
      const v = String(r[col.qty] ?? '').trim();
      if (v && (!/^\d+(\.\d+)?$/.test(v) || Number(v) <= 0)) formatIssues.push(`第 ${lineNo} 行：数量格式异常`);
    }
    if (col.amount != null) {
      const v = String(r[col.amount] ?? '').trim();
      if (v && (!/^\d+(\.\d+)?$/.test(v) || Number(v) < 0)) formatIssues.push(`第 ${lineNo} 行：金额格式异常`);
    }
  });
  const traceIdx = header.findIndex(h => /追溯码|溯源码|trace/i.test(h));
  if (traceIdx >= 0) {
    const seen = new Map();
    rows.forEach((r, i) => {
      const v = String(r[traceIdx] ?? '').trim();
      if (!v) return;
      if (!TRACE_RE.test(v)) formatIssues.push(`第 ${i + 2} 行：追溯码格式异常`);
      if (seen.has(v)) formatIssues.push(`第 ${i + 2} 行：追溯码与第 ${seen.get(v)} 行重复`);
      else seen.set(v, i + 2);
    });
  }
  emptyStats.forEach(x => formatIssues.push(`${x.field} 空值 ${x.empty} 行`));
  const orphanRows = rows.map((r, i) => ({ r, i: i + 2 })).filter(({ r }) => {
    const hasAmount = col.amount != null && String(r[col.amount] ?? '').trim();
    const noItem = col.item_name == null || !String(r[col.item_name] ?? '').trim();
    const noDeptDoctor = (col.dept == null || !String(r[col.dept] ?? '').trim()) && (col.doctor == null || !String(r[col.doctor] ?? '').trim());
    return hasAmount && (noItem || noDeptDoctor);
  });
  return { rows, missing, formatIssues, orphanRows };
}
function reportHtml(a) {
  return `
    <div class="cards" style="margin-top:0">
      <div class="metric"><b>${a.rows.length}</b><span>数据行</span></div>
      <div class="metric ${a.missing.length ? 'hot' : 'ok'}"><b>${a.missing.length}</b><span>字段缺失</span></div>
      <div class="metric ${a.formatIssues.length ? 'hot' : 'ok'}"><b>${a.formatIssues.length}</b><span>编码/格式问题</span></div>
      <div class="metric ${a.orphanRows.length ? 'hot' : 'ok'}"><b>${a.orphanRows.length}</b><span>孤儿行</span></div>
    </div>
    <article class="issue ${a.missing.length ? 'hot' : 'ok'}"><h2>1. 字段缺失</h2>${a.missing.length ? `<ul>${a.missing.map(x => `<li>${TK.esc(x)}</li>`).join('')}</ul>` : '<p>必要字段均已识别。</p>'}</article>
    <article class="issue ${a.formatIssues.length ? 'hot' : 'ok'}"><h2>2. 编码格式</h2>${a.formatIssues.length ? `<ul>${a.formatIssues.map(x => `<li>${TK.esc(x)}</li>`).join('')}</ul>` : '<p>年龄、数量、金额、追溯码格式未发现明显异常。</p>'}</article>
    <article class="issue ${a.orphanRows.length ? 'hot' : 'ok'}"><h2>3. 孤儿行</h2>${a.orphanRows.length ? `<ul>${a.orphanRows.map(x => `<li>第 ${x.i} 行：有金额但缺项目名或科室/医生归属</li>`).join('')}</ul>` : '<p>未发现有金额但缺关键归属的孤儿行。</p>'}</article>
    <div class="note">建议动作：退回医院补齐字段、修正空值和孤儿行后，再进入 <a href="/regulator-triage.html">疑点分诊</a> 或 <a href="/regulator-fieldkit.html">飞检行装包</a>。</div>`;
}
function runCheck() { $('#result').innerHTML = reportHtml(analyze($('#raw').value)); }
$('#check').addEventListener('click', runCheck);
$('#demo').addEventListener('click', () => { $('#raw').value = $('#raw').defaultValue; runCheck(); });

/* ---------- 模拟场景：月初报送表体检 ---------- */
TK.scenario({
  mount: '#scPlayer',
  role: '信息科审核员 · 小孙',
  where: '月初 · 医保局信息科 · 定点机构月报刚到',
  text: '医院月报 Excel 到了，直接进筛查引擎吗？慢——脏数据进引擎只会产出脏线索：缺列会漏检，孤儿行会误伤。小孙的习惯是：先体检，不合格退回补报，合格再送疑点分诊。',
  steps: [
    {
      id: 'paste', title: '粘贴这个月的报送表', sub: '零依赖 · 纯本机校验 · 数据不出机', btn: '粘贴并体检',
      say: '从 Excel 全选复制、粘贴，一步出体检报告——不用装任何东西。',
      run: async (ctx) => {
        ctx.a = analyze($('#raw').defaultValue);
        return reportHtml(ctx.a);
      },
    },
    {
      id: 'verdict', title: '给报送质量下结论', sub: '合格 → 送分诊 / 不合格 → 退回补报', btn: '出体检结论',
      say: '三类问题各有一个明确的处理动作：缺字段退回、格式异常改正、孤儿行补归属。这一步挡住的是引擎的输入质量。',
      run: async (ctx) => {
        if (!ctx.a) throw new Error('请先执行第 1 步');
        const bad = ctx.a.missing.length + ctx.a.formatIssues.length + ctx.a.orphanRows.length;
        return bad
          ? `<div class="tier b"><b>⚠ 本次报送不合格：${bad} 处数据质量问题</b><span>按清单退回医院补报。修复后重新体检，合格再进疑点分诊——保证引擎吃到的是干净输入。</span></div>`
          : `<div class="tier c"><b>✓ 报送合格</b><span>可以直接送疑点分诊。</span></div>`;
      },
    },
  ],
  finale: {
    text: '数据体检 → 疑点分诊 → 飞检行装包，一条监管数据流水线。',
    next: { label: '送去疑点分诊器', href: '/regulator-triage.html?scenario=1' },
  },
});
</script>
</body>
</html>
