<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鹰眼 · 国家两库 79 条规则覆盖地图</title>
  <style>
    :root { --bg:#0b1220; --card:#141f33; --line:#2a3a55; --txt:#e8ecf4; --muted:#8b9bb5;
      --impl:#16a34a; --pilot:#ca8a04; --cand:#64748b; --road:#6366f1; --accent:#f15b52; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:"PingFang SC","Noto Sans SC",system-ui,sans-serif; background:var(--bg); color:var(--txt); min-height:100vh; }
    header { padding:20px 24px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
    h1 { margin:0; font-size:22px; }
    .sub { color:var(--muted); font-size:13px; margin-top:4px; }
    .legend { display:flex; gap:12px; flex-wrap:wrap; font-size:12px; }
    .legend span { display:flex; align-items:center; gap:6px; }
    .dot { width:12px; height:12px; border-radius:3px; }
    main { padding:20px 24px 40px; max-width:1400px; margin:0 auto; }
    .stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; margin-bottom:20px; }
    .stat { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px; text-align:center; }
    .stat b { display:block; font-size:24px; }
    .stat span { font-size:11px; color:var(--muted); }
    .tier1 { margin-bottom:28px; }
    .tier1>h2 { font-size:16px; margin:0 0 12px; color:var(--accent); }
    .tier2 { margin-bottom:16px; }
    .tier2>h3 { font-size:13px; margin:0 0 8px; color:var(--muted); font-weight:700; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:8px; }
    .cell { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:10px; cursor:pointer; min-height:88px; transition:transform .12s; }
    .cell:hover { transform:translateY(-2px); border-color:#4a6080; }
    .cell.implemented { border-left:4px solid var(--impl); }
    .cell.pilot { border-left:4px solid var(--pilot); }
    .cell.candidate { border-left:4px solid var(--cand); }
    .cell.roadmap { border-left:4px dashed var(--road); }
    .code { font-family:ui-monospace,monospace; font-size:10px; color:var(--muted); word-break:break-all; }
    .name { font-size:12px; font-weight:700; margin:4px 0; line-height:1.3; }
    .tags { font-size:10px; color:var(--muted); }
    .enh { color:#a78bfa; }
    dialog { border:1px solid var(--line); border-radius:12px; background:var(--card); color:var(--txt); padding:20px; max-width:520px; width:90%; }
    dialog::backdrop { background:rgba(0,0,0,.6); }
    dialog h2 { margin:0 0 8px; font-size:16px; }
    dialog p { font-size:13px; line-height:1.5; color:#c5d0e0; }
    .back { color:#7dd3fc; text-decoration:none; font-size:13px; }
    #err { color:#fca5a5; padding:20px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>国家两库 · 79 条官方规则覆盖地图</h1>
      <p class="sub">GZ/ZB 官方编码坐标 · 鹰眼 checker 挂接状态（诚实标注未覆盖项）</p>
    </div>
    <div class="legend">
      <span><i class="dot" style="background:var(--impl)"></i>已实现</span>
      <span><i class="dot" style="background:var(--pilot)"></i>试运行</span>
      <span><i class="dot" style="background:var(--cand)"></i>候选</span>
      <span><i class="dot" style="background:var(--road)"></i>路线图</span>
    </div>
    <a class="back" href="/dashboard.html">← 返回看板</a>
  </header>
  <main id="main"><p class="sub">加载中…</p></main>
  <dialog id="detail"><button type="button" onclick="detail.close()" style="float:right">✕</button><div id="detailBody"></div></dialog>
  <script>
    const STATUS_LABEL = { implemented:'已实现', pilot:'试运行', candidate:'候选', roadmap:'路线图' };
    function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
    function render(data){
      const s=data.summary||{};
      const oc=data.official_coverage||{};
      let html=`<div class="stats">
        <div class="stat"><b>${s.total||0}</b><span>官方规则</span></div>
        <div class="stat"><b style="color:var(--impl)">${s.implemented||0}</b><span>已实现</span></div>
        <div class="stat"><b style="color:var(--pilot)">${s.pilot||0}</b><span>试运行</span></div>
        <div class="stat"><b>${s.candidate||0}</b><span>候选</span></div>
        <div class="stat"><b style="color:var(--road)">${s.roadmap||0}</b><span>路线图</span></div>
        <div class="stat"><b>${oc.core_checker_count||0}</b><span>核心 checker</span></div>
        <div class="stat"><b class="enh">${oc.enhancement_checker_count||0}</b><span>增强 checker</span></div>
      </div>`;
      for(const t1 of (data.tier1||[])){
        html+=`<section class="tier1"><h2>${esc(t1.label)}（${t1.count}条）</h2>`;
        for(const t2 of (t1.tier2||[])){
          html+=`<div class="tier2"><h3>${esc(t2.label)} · ${t2.rules?.length||0}格</h3><div class="grid">`;
          for(const r of (t2.rules||[])){
            const st=r.coverage_status||'candidate';
            const ids=(r.eagle_rule_ids||[]).join(', ');
            html+=`<div class="cell ${st}" data-code="${esc(r.official_code)}" tabindex="0">
              <div class="code">${esc(r.official_code)}</div>
              <div class="name">${esc(r.name)}</div>
              <div class="tags">${STATUS_LABEL[st]||st}${ids?' · '+esc(ids):''}${r.tier==='enhancement'?' · 增强':''}</div>
            </div>`;
          }
          html+=`</div></div>`;
        }
        html+=`</section>`;
      }
      document.getElementById('main').innerHTML=html;
      const byCode={}; (data.cells||[]).forEach(c=>byCode[c.official_code]=c);
      document.querySelectorAll('.cell').forEach(el=>{
        el.addEventListener('click',()=>{
          const c=byCode[el.dataset.code]; if(!c) return;
          document.getElementById('detailBody').innerHTML=`
            <h2>${esc(c.name)}</h2>
            <p class="code">${esc(c.official_code)} · ${esc(c.tier1)} / ${esc(c.tier2)}</p>
            <p><b>状态：</b>${STATUS_LABEL[c.coverage_status]||c.coverage_status}</p>
            <p><b>鹰眼规则：</b>${esc((c.eagle_rule_ids||[]).join('、')||'—')}</p>
            <p>${esc(c.definition||'')}</p>
            ${c.notes?`<p><i>${esc(c.notes)}</i></p>`:''}`;
          detail.showModal();
        });
      });
    }
    fetch('/api/official-coverage').then(r=>r.json()).then(d=>{
      if(d.error) document.getElementById('main').innerHTML=`<p id="err">${esc(d.error)}</p>`;
      else render(d);
    }).catch(e=>{ document.getElementById('main').innerHTML=`<p id="err">${esc(e.message)}</p>`; });
  </script>
</body>
</html>
