<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鹰眼 · 国家两库 79 条规则覆盖地图</title>
  <style>
    :root { --bg:#0b1220; --card:#141f33; --line:#2a3a55; --txt:#e8ecf4; --muted:#8b9bb5;
      --impl:#16a34a; --pilot:#ca8a04; --cand:#64748b; --road:#6366f1; --accent:#f15b52; --ready:#22d3ee; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:"PingFang SC","Noto Sans SC",system-ui,sans-serif; background:var(--bg); color:var(--txt); min-height:100vh; }
    header { padding:20px 24px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:16px; }
    h1 { margin:0; font-size:22px; }
    .sub { color:var(--muted); font-size:13px; margin-top:4px; max-width:720px; line-height:1.5; }
    .legend { display:flex; gap:12px; flex-wrap:wrap; font-size:12px; }
    .legend span { display:flex; align-items:center; gap:6px; }
    .dot { width:12px; height:12px; border-radius:3px; flex-shrink:0; }
    main { padding:20px 24px 40px; max-width:1400px; margin:0 auto; }
    .structure { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:16px; font-size:12px; line-height:1.6; color:#c5d0e0; }
    .structure b { color:var(--txt); }
    .structure code { font-family:ui-monospace,monospace; font-size:11px; background:#0f1729; padding:1px 5px; border-radius:4px; }
    .stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:10px; margin-bottom:20px; }
    .stat { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px; text-align:center; }
    .stat b { display:block; font-size:22px; }
    .stat span { font-size:11px; color:var(--muted); }
    .stat.wide { grid-column:span 2; text-align:left; }
    .stat.wide b { font-size:14px; font-weight:600; }
    .tier1 { margin-bottom:28px; }
    .tier1>h2 { font-size:16px; margin:0 0 12px; color:var(--accent); }
    .tier2 { margin-bottom:16px; }
    .tier2>h3 { font-size:13px; margin:0 0 8px; color:var(--muted); font-weight:700; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(148px,1fr)); gap:8px; }
    .cell { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:10px; cursor:pointer; min-height:92px; transition:transform .12s; }
    .cell:hover { transform:translateY(-2px); border-color:#4a6080; }
    .cell.implemented { border-left:4px solid var(--impl); }
    .cell.pilot { border-left:4px solid var(--pilot); }
    .cell.candidate { border-left:4px solid var(--cand); }
    .cell.roadmap { border-left:4px dashed var(--road); }
    .code { font-family:ui-monospace,monospace; font-size:10px; color:var(--muted); word-break:break-all; }
    .name { font-size:12px; font-weight:700; margin:4px 0; line-height:1.3; }
    .tags { font-size:10px; color:var(--muted); line-height:1.4; }
    .handler { color:#7dd3fc; }
    .enh { color:#a78bfa; }
    .wired { color:var(--impl); }
    dialog { border:1px solid var(--line); border-radius:12px; background:var(--card); color:var(--txt); padding:20px; max-width:560px; width:90%; }
    dialog::backdrop { background:rgba(0,0,0,.6); }
    dialog h2 { margin:0 0 8px; font-size:16px; }
    dialog p { font-size:13px; line-height:1.5; color:#c5d0e0; margin:8px 0; }
    dialog dl { font-size:12px; margin:12px 0 0; }
    dialog dt { color:var(--muted); margin-top:8px; }
    dialog dd { margin:2px 0 0; color:var(--txt); }
    .back { color:#7dd3fc; text-decoration:none; font-size:13px; white-space:nowrap; }
    #err { color:#fca5a5; padding:20px; }
    .refresh { font-size:11px; color:var(--muted); margin-top:8px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>国家两库 · 79 条官方规则覆盖地图</h1>
      <p class="sub">GZ/ZB 官方编码坐标 · 鹰眼 <code>ruleCheckers</code> 接线状态 · checker 未注册时自动降级为「试运行」</p>
    </div>
    <div class="legend">
      <span><i class="dot" style="background:var(--impl)"></i>已实现（checker 已挂接）</span>
      <span><i class="dot" style="background:var(--pilot)"></i>试运行（映射有、引擎未挂）</span>
      <span><i class="dot" style="background:var(--cand)"></i>候选</span>
      <span><i class="dot" style="background:var(--road)"></i>路线图</span>
    </div>
    <a class="back" href="/home.html">← 首页</a>
    <a class="back" href="/dashboard.html">← 返回看板</a>
  </header>
  <main id="main"><p class="sub">加载中…</p></main>
  <dialog id="detail"><button type="button" onclick="detail.close()" style="float:right;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px">✕</button><div id="detailBody"></div></dialog>
  <script>
    const STATUS_LABEL = { implemented:'已实现', pilot:'试运行', candidate:'候选', roadmap:'路线图' };
    function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
    function fmtFamily(fb){
      if(!fb) return '';
      const parts = [];
      if(fb.naming_62!=null) parts.push(`13族命名 <b>${fb.naming_62}</b>`);
      if(fb.embed_4!=null) parts.push(`埋点 <b>${fb.embed_4}</b>/4`);
      if(fb.l3_5!=null) parts.push(`L3 <b>${fb.l3_5}</b>/5`);
      if(fb.zb_8!=null) parts.push(`ZB <b>${fb.zb_8}</b>/8`);
      return parts.join(' · ');
    }
    function render(data){
      const s=data.summary||{};
      const oc=data.official_coverage||{};
      const fb=oc.family_breakdown||{};
      const pct=s.total?Math.round((s.implemented||0)/s.total*100):0;
      let html=`<div class="structure">
        <b>规则库三层结构</b>（与主平台一致）：<code>rules.yaml</code> 共 <b>${oc.rules_yaml_count||79}</b> 条 rule_id
        = 13 前缀族 <b>62</b> + 埋点 <b>4</b>（SUR/TRACE/NUR/AGE）+ L3 聚合 <b>5</b> + ZB 统计 <b>8</b> = <b>79</b>。
        引擎已注册 checker：<b>${oc.rule_checker_count??'—'}</b> 个。
        ${fmtFamily(fb)}
      </div>`;
      html+=`<div class="stats">
        <div class="stat"><b>${s.total||0}</b><span>官方规则格</span></div>
        <div class="stat"><b style="color:var(--impl)">${s.implemented||0}</b><span>已实现 ${pct}%</span></div>
        <div class="stat"><b style="color:var(--ready)">${oc.production_ready??'—'}</b><span>生产就绪</span></div>
        <div class="stat"><b style="color:var(--pilot)">${s.pilot||0}</b><span>试运行</span></div>
        <div class="stat"><b>${s.candidate||0}</b><span>候选</span></div>
        <div class="stat"><b style="color:var(--road)">${s.roadmap||0}</b><span>路线图</span></div>
        <div class="stat"><b>${oc.rule_checker_count??'—'}</b><span>checker 注册</span></div>
        <div class="stat"><b>${oc.core_checker_count||0}</b><span>核心 checker</span></div>
        <div class="stat"><b class="enh">${oc.enhancement_checker_count||0}</b><span>增强 checker</span></div>
      </div>`;
      if((s.pilot||0)>0){
        html+=`<p class="sub" style="margin:-8px 0 16px;color:var(--pilot)">⚠ 仍有 ${s.pilot} 格显示试运行：请确认已重启 <code>node server.js</code> 并加载最新 audit-engine。</p>`;
      }
      for(const t1 of (data.tier1||[])){
        html+=`<section class="tier1"><h2>${esc(t1.label)}（${t1.count}条）</h2>`;
        for(const t2 of (t1.tier2||[])){
          html+=`<div class="tier2"><h3>${esc(t2.label)} · ${t2.rules?.length||0}格</h3><div class="grid">`;
          for(const r of (t2.rules||[])){
            const st=r.coverage_status||'candidate';
            const ids=(r.eagle_rule_ids||[]).join(', ');
            const handler=r.handler?`<span class="handler">${esc(r.handler)}</span>`:'';
            const l3=(r.l3_families||[]).length?` · L3:${esc(r.l3_families.join('/'))}`:'';
            html+=`<div class="cell ${st}" data-code="${esc(r.official_code)}" tabindex="0">
              <div class="code">${esc(r.official_code)}</div>
              <div class="name">${esc(r.name)}</div>
              <div class="tags">${STATUS_LABEL[st]||st}${ids?' · '+esc(ids):''}${handler}${l3}${r.tier==='enhancement'?' · <span class="enh">增强</span>':''}</div>
            </div>`;
          }
          html+=`</div></div>`;
        }
        html+=`</section>`;
      }
      html+=`<p class="refresh">数据来自 GET /api/official-coverage · ${new Date().toLocaleString('zh-CN')}</p>`;
      document.getElementById('main').innerHTML=html;
      const byCode={}; (data.cells||[]).forEach(c=>byCode[c.official_code]=c);
      document.querySelectorAll('.cell').forEach(el=>{
        el.addEventListener('click',()=>{
          const c=byCode[el.dataset.code]; if(!c) return;
          const prod=c.production||{};
          const rs=c.runtime_stats;
          document.getElementById('detailBody').innerHTML=`
            <h2>${esc(c.name)}</h2>
            <p class="code">${esc(c.official_code)} · ${esc(c.tier1)} / ${esc(c.tier2)}</p>
            <dl>
              <dt>覆盖状态</dt><dd>${STATUS_LABEL[c.coverage_status]||c.coverage_status}${c.checker_wired?' · <span class="wired">checker 已挂接</span>':''}</dd>
              <dt>鹰眼 rule_id</dt><dd>${esc((c.eagle_rule_ids||[]).join('、')||'—')}</dd>
              ${c.handler?`<dt>执行 handler</dt><dd><code>${esc(c.handler)}</code></dd>`:''}
              ${(c.l3_families||[]).length?`<dt>L3 聚合族</dt><dd>${esc(c.l3_families.join('、'))}</dd>`:''}
              ${prod.workflow?`<dt>生产流程</dt><dd>${esc(prod.workflow)}${prod.yhf_verified?' · 已过门禁':''}</dd>`:''}
              ${prod.test_anchor?`<dt>测试锚点</dt><dd><code>${esc(prod.test_anchor)}</code></dd>`:''}
              ${rs?`<dt>运行统计</dt><dd>触发 ${rs.fire_count??0} 次 · 最近 ${esc(rs.last_fired_at||'—')}</dd>`:''}
            </dl>
            <p>${esc(c.definition||'')}</p>
            ${c.notes?`<p><i>${esc(c.notes)}</i></p>`:''}`;
          detail.showModal();
        });
      });
    }
    fetch('/api/official-coverage?_='+Date.now()).then(r=>r.json()).then(d=>{
      if(d.error) document.getElementById('main').innerHTML=`<p id="err">${esc(d.error)}</p>`;
      else render(d);
    }).catch(e=>{ document.getElementById('main').innerHTML=`<p id="err">${esc(e.message)}</p>`; });
  </script>
</body>
</html>
