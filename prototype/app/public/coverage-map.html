<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鹰眼 · 国家两库 88 类规则覆盖地图（2025年版）</title>
  <style>
    :root { --bg:#0b1220; --card:#141f33; --line:#2a3a55; --txt:#e8ecf4; --muted:#8b9bb5;
      --ckp:#16a34a; --conly:#22d3ee; --kponly:#ca8a04; --blank:#64748b; --new:#a78bfa; --accent:#f15b52; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:"PingFang SC","Noto Sans SC",system-ui,sans-serif; background:var(--bg); color:var(--txt); min-height:100vh; }
    header { padding:20px 24px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:16px; }
    h1 { margin:0; font-size:22px; }
    .sub { color:var(--muted); font-size:13px; margin-top:4px; max-width:760px; line-height:1.5; }
    .legend { display:flex; gap:12px; flex-wrap:wrap; font-size:12px; }
    .legend span { display:flex; align-items:center; gap:6px; }
    .dot { width:12px; height:12px; border-radius:3px; flex-shrink:0; }
    main { padding:20px 24px 40px; max-width:1400px; margin:0 auto; }
    .structure { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:16px; font-size:12px; line-height:1.6; color:#c5d0e0; }
    .structure b { color:var(--txt); }
    .structure code { font-family:ui-monospace,monospace; font-size:11px; background:#0f1729; padding:1px 5px; border-radius:4px; }
    .stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:10px; margin-bottom:20px; }
    .stat { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px; text-align:center; }
    .stat b { display:block; font-size:22px; }
    .stat span { font-size:11px; color:var(--muted); }
    .tier1 { margin-bottom:28px; }
    .tier1>h2 { font-size:16px; margin:0 0 12px; color:var(--accent); }
    .tier2 { margin-bottom:16px; }
    .tier2>h3 { font-size:13px; margin:0 0 8px; color:var(--muted); font-weight:700; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(158px,1fr)); gap:8px; }
    .cell { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:10px; cursor:pointer; min-height:96px; transition:transform .12s; position:relative; }
    .cell:hover { transform:translateY(-2px); border-color:#4a6080; }
    .cell.ckp { border-left:4px solid var(--ckp); }
    .cell.conly { border-left:4px solid var(--conly); }
    .cell.kponly { border-left:4px solid var(--kponly); }
    .cell.blank { border-left:4px dashed var(--blank); }
    .code { font-family:ui-monospace,monospace; font-size:10px; color:var(--muted); word-break:break-all; }
    .name { font-size:12px; font-weight:700; margin:4px 0; line-height:1.3; }
    .tags { font-size:10px; color:var(--muted); line-height:1.4; }
    .kp { color:var(--ckp); font-weight:700; }
    .badge-new { position:absolute; top:8px; right:8px; font-size:9px; color:#0b1220; background:var(--new); padding:1px 5px; border-radius:4px; font-weight:700; }
    .badge-detail { color:var(--conly); }
    dialog { border:1px solid var(--line); border-radius:12px; background:var(--card); color:var(--txt); padding:20px; max-width:560px; width:90%; }
    dialog::backdrop { background:rgba(0,0,0,.6); }
    dialog h2 { margin:0 0 8px; font-size:16px; }
    dialog dl { font-size:12px; margin:12px 0 0; }
    dialog dt { color:var(--muted); margin-top:8px; }
    dialog dd { margin:2px 0 0; color:var(--txt); }
    .back { color:#7dd3fc; text-decoration:none; font-size:13px; white-space:nowrap; }
    #err { color:#fca5a5; padding:20px; }
    .refresh { font-size:11px; color:var(--muted); margin-top:8px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>国家两库 · <span id="totalRules">88</span> 类规则覆盖地图<span style="color:var(--muted);font-size:14px">（2025年版全量口径）</span></h1>
      <p class="sub">坐标系 = 官方《规则库、知识库（2025年版）》<b>88 类</b>（较框架体系 1.0 的 79 条新增 10 类）。格子按鹰眼 checker 接线 × 是否已入两库知识点着色。</p>
    </div>
    <div class="legend">
      <span><i class="dot" style="background:var(--ckp)"></i>有 checker 且已入知识点</span>
      <span><i class="dot" style="background:var(--conly)"></i>有 checker 暂无两库明细</span>
      <span><i class="dot" style="background:var(--kponly)"></i>已入知识点·2025新增类</span>
      <span><i class="dot" style="background:var(--blank)"></i>2025新增·待入库</span>
      <span><i class="dot" style="background:var(--new)"></i>2025 新增类</span>
    </div>
    <a class="back" href="/home.html">← 首页</a>
    <a class="back" href="/dashboard.html">← 返回看板</a>
  </header>
  <main id="main"><p class="sub">加载中…</p></main>
  <dialog id="detail"><button type="button" onclick="detail.close()" style="float:right;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px">✕</button><div id="detailBody"></div></dialog>
  <script>
    const STATUS_LABEL = { 'checker+kp':'有checker·已入知识点', checker_only:'有checker·暂无明细', kp_only:'已入知识点·2025新增', blank:'2025新增·待入库' };
    const STATUS_CLASS = { 'checker+kp':'ckp', checker_only:'conly', kp_only:'kponly', blank:'blank' };
    const T1_ORDER = ['政策类','管理类','医疗类'];
    function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
    function render(data){
      const m=data.meta||{}; const s=m.summary||{};
      let html=`<div class="structure">
        <b>四层数字口径</b>（别串台）：框架 1.0 = <b>79 条</b>骨架 · 2025年版全量 = <b>88 类 / 24.7 万知识点</b>（全部对应医保编码） ·
        公开发布至 <b>第十七批</b>（2026-06-29，六月连发三批） · 省级实操口径约 150 万条（仅呼应专家维护复杂度时用）。
        本图坐标 = <b>${m.total_rules||88}</b> 类；其中 <b>${m.new_in_2025||0}</b> 类为 2025 新增、<b>${m.official_kp_detail_rules||0}</b> 类官方标注「对应知识点明细」；鹰眼已入库两库知识点 <b>${m.ingested_knowledge_points||0}</b> 条。
      </div>`;
      html+=`<div class="stats">
        <div class="stat"><b>${m.total_rules||88}</b><span>规则格（88类）</span></div>
        <div class="stat"><b style="color:var(--ckp)">${s['checker+kp']||0}</b><span>checker+知识点</span></div>
        <div class="stat"><b style="color:var(--conly)">${s.checker_only||0}</b><span>有checker暂无明细</span></div>
        <div class="stat"><b style="color:var(--kponly)">${s.kp_only||0}</b><span>已入·2025新增</span></div>
        <div class="stat"><b style="color:var(--blank)">${s.blank||0}</b><span>2025新增待入</span></div>
        <div class="stat"><b class="badge-detail">${m.new_in_2025||0}</b><span>2025 新增类</span></div>
        <div class="stat"><b>${m.official_kp_detail_rules||0}</b><span>官方有明细</span></div>
        <div class="stat"><b>${m.ingested_knowledge_points||0}</b><span>已入库知识点</span></div>
      </div>`;
      // group cells → tier1 → tier2
      const cells=data.cells||[];
      const byT1=new Map();
      for(const c of cells){ if(!byT1.has(c.level1)) byT1.set(c.level1,new Map());
        const t2=byT1.get(c.level1); if(!t2.has(c.level2)) t2.set(c.level2,[]); t2.get(c.level2).push(c); }
      const t1keys=[...byT1.keys()].sort((a,b)=>T1_ORDER.indexOf(a)-T1_ORDER.indexOf(b));
      for(const t1 of t1keys){
        const t2map=byT1.get(t1); const t1count=[...t2map.values()].reduce((n,a)=>n+a.length,0);
        html+=`<section class="tier1"><h2>${esc(t1)}（${t1count}类）</h2>`;
        for(const [t2,rules] of t2map){
          html+=`<div class="tier2"><h3>${esc(t2)} · ${rules.length}格</h3><div class="grid">`;
          for(const r of rules){
            const cls=STATUS_CLASS[r.status]||'blank';
            const code=r.gz_code_1_0?esc(r.gz_code_1_0):'<span style="color:var(--new)">2025新增·暂无GZ</span>';
            const kp=r.knowledge_points>0?`<span class="kp">${r.knowledge_points} 知识点</span>`:'<span>暂无入库</span>';
            const detail=r.official_has_kp_detail?' · <span class="badge-detail">官方有明细</span>':'';
            html+=`<div class="cell ${cls}" data-seq="${r.seq}" tabindex="0">
              ${r.new_in_2025?'<span class="badge-new">2025新增</span>':''}
              <div class="code">${code}</div>
              <div class="name">${esc(r.rule_name)}</div>
              <div class="tags">${kp}${detail}</div>
            </div>`;
          }
          html+=`</div></div>`;
        }
        html+=`</section>`;
      }
      html+=`<p class="refresh">数据来自 /two-libraries-coverage.json（${esc(m.coordinate_frame||'')}） · ${new Date().toLocaleString('zh-CN')}</p>`;
      document.getElementById('main').innerHTML=html;
      const bySeq={}; cells.forEach(c=>bySeq[c.seq]=c);
      document.querySelectorAll('.cell').forEach(el=>{
        el.addEventListener('click',()=>{
          const c=bySeq[el.dataset.seq]; if(!c) return;
          document.getElementById('detailBody').innerHTML=`
            <h2>${esc(c.rule_name)}${c.new_in_2025?' <span class="badge-new" style="position:static">2025新增</span>':''}</h2>
            <p class="code">${c.gz_code_1_0?esc(c.gz_code_1_0):'2025新增·框架1.0无对应GZ'} · ${esc(c.level1)} / ${esc(c.level2)} · 序号 ${c.seq}</p>
            <dl>
              <dt>覆盖状态</dt><dd>${STATUS_LABEL[c.status]||c.status}</dd>
              <dt>官方「对应知识点明细」</dt><dd>${c.official_has_kp_detail?'是':'否'}</dd>
              <dt>鹰眼已入库知识点</dt><dd>${c.knowledge_points||0} 条</dd>
              <dt>checker 接线</dt><dd>${c.has_checker?('已接线'+(c.coverage_status?'（'+esc(c.coverage_status)+'）':'')):'暂无（多为2025新增类）'}</dd>
              ${(c.eagle_rule_ids||[]).length?`<dt>鹰眼 rule_id</dt><dd>${esc(c.eagle_rule_ids.join('、'))}</dd>`:''}
              ${c.handler?`<dt>执行 handler</dt><dd><code>${esc(c.handler)}</code></dd>`:''}
            </dl>`;
          detail.showModal();
        });
      });
    }
    fetch('/two-libraries-coverage.json?_='+Date.now()).then(r=>{ if(!r.ok) throw new Error('未找到 /two-libraries-coverage.json（请先跑 node scripts/build-two-libraries.mjs）'); return r.json(); })
      .then(render)
      .catch(e=>{ document.getElementById('main').innerHTML=`<p id="err">${esc(e.message)}</p>`; });
  </script>
</body>
</html>
