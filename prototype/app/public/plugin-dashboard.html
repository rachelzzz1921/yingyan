<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鹰眼 · 院端事前提醒运营看板</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f2f5f9;color:#1a2b3c;font-size:13px;padding:22px}
h1{font-size:19px;margin-bottom:2px}
.sub{color:#7a8ba0;font-size:12px;margin-bottom:18px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px 16px}
.card .n{font-size:26px;font-weight:800}
.card .l{color:#7a8ba0;font-size:12px;margin-top:2px}
.card .hint{font-size:11px;color:#94a3b8;margin-top:4px}
.n.green{color:#0a7a4b}.n.amber{color:#b45309}.n.red{color:#b91c1c}
.panel{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px 16px;margin-bottom:14px}
.panel h2{font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:#f1f5f9;text-align:left;padding:7px 9px;color:#41556b;font-weight:600}
td{padding:6px 9px;border-top:1px solid #eef2f7}
.badge{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11px;font-weight:700}
.b-hard{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.b-heed{background:#ecfdf5;color:#0a7a4b;border:1px solid #a7f3d0}
.b-over{background:#fffbe6;color:#b45309;border:1px solid #fde68a}
.empty{padding:20px;text-align:center;color:#94a3b8}
.bar{height:6px;border-radius:4px;background:#e2e8f0;overflow:hidden;margin-top:6px}
.bar > div{height:100%;background:#0a7a4b}
a{color:#2563eb;text-decoration:none}
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
button{padding:5px 12px;border:1px solid #cbd5e1;background:#fff;border-radius:6px;cursor:pointer;font-size:12px}
</style>
</head>
<body>
<div class="topbar">
  <div style="flex:1"><h1>🦅 鹰眼 · 院端事前提醒运营看板</h1>
  <div class="sub">开单事前提醒的处置闭环:违规消灭在萌芽 · 未遵从转监管重点审核。<span id="ts"></span></div></div>
  <a href="/mockhis.html">← 开单靶站</a>
  <a href="/priority.html">监管工作台 →</a>
  <button id="btnRefresh">↻ 刷新</button>
  <button id="btnReset" title="演示前清空台账">清空</button>
</div>

<div class="cards" id="cards"></div>

<div class="panel">
  <h2>⚠ 事前已提醒·未遵从 → 监管重点审核清单</h2>
  <div class="sub" style="margin-bottom:8px">医生开单时已收到提醒仍坚持提交的单——同一引擎推送到监管侧,事中/事后重点盯,并附医生填写的理由。这是院端↔监管闭环的落点。</div>
  <div id="pending"></div>
</div>

<div class="panel">
  <h2>📋 今日提醒明细(近25条)</h2>
  <div id="recent"></div>
</div>

<script>
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hhmm(iso){try{return new Date(iso).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});}catch(e){return String(iso).slice(11,16);}}
async function load(){
  const d = await fetch('/api/precheck/ledger').then(r=>r.json());
  document.getElementById('ts').textContent = ' · 更新于 '+new Date(d.generated_at).toLocaleTimeString();
  const t = d.today||{};
  const heedRate = d.heed_rate==null? '—' : d.heed_rate+'%';
  document.getElementById('cards').innerHTML = [
    ['今日提醒', t.reminders_fired||0, '', '开单命中提醒的次数'],
    ['遵从率', heedRate, 'green', '采纳整改 / 已处置'],
    ['萌芽拦截', d.budding_intercepts||0, 'green', '采纳的明确违规·消灭在开单环节(院端拦截量)'],
    ['未遵从待监管', t.overridden||0, 'amber', '强行提交·转监管重点审核'],
  ].map(function(c){return '<div class="card"><div class="n '+c[2]+'">'+c[1]+'</div><div class="l">'+c[0]+'</div><div class="hint">'+c[3]+'</div></div>';}).join('');

  const pend = d.pending_supervision||[];
  document.getElementById('pending').innerHTML = pend.length
    ? '<table><thead><tr><th>时间</th><th>科室</th><th>患者</th><th>命中</th><th>医生理由</th><th></th></tr></thead><tbody>'
      + pend.map(function(e){return '<tr><td>'+hhmm(e.at)+'</td><td>'+esc(e.dept||'—')+'</td><td>'+esc((e.sex||'')+(e.age!=null?e.age+'岁':''))+' '+esc(e.diagnosis||'')+'</td><td>'+(e.rules||[]).map(function(r){return '<span class="badge b-hard">'+esc(r)+'</span>';}).join(' ')+'</td><td>'+esc(e.reason||'—')+'</td><td><span class="badge b-over">⚠开单时已提醒未遵从</span></td></tr>';}).join('')
      + '</tbody></table>'
    : '<div class="empty">暂无未遵从记录——医生均采纳了事前提醒(全部消灭在萌芽)。</div>';

  const rec = d.recent||[];
  const actLabel = {heeded:'<span class="badge b-heed">采纳整改</span>', overridden:'<span class="badge b-over">坚持提交</span>', pending:'待处置'};
  document.getElementById('recent').innerHTML = rec.length
    ? '<table><thead><tr><th>时间</th><th>科室</th><th>命中(硬/软)</th><th>首要规则</th><th>处置</th><th>理由</th></tr></thead><tbody>'
      + rec.map(function(e){return '<tr><td>'+hhmm(e.at)+'</td><td>'+esc(e.dept||'—')+'</td><td>'+(e.hard_count||0)+' / '+(e.suspect_count||0)+'</td><td>'+esc(e.top_rule||'—')+'</td><td>'+(actLabel[e.action]||esc(e.action))+'</td><td>'+esc(e.reason||'')+'</td></tr>';}).join('')
      + '</tbody></table>'
    : '<div class="empty">今日暂无提醒记录。去 <a href="/mockhis.html">开单靶站</a> 触发几条,回来看闭环。</div>';
}
document.getElementById('btnRefresh').onclick = load;
document.getElementById('btnReset').onclick = async () => {
  const r = await fetch('/api/precheck/ledger',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'reset'})});
  if (r.status === 401) { alert('清空需管理员令牌(本机配了鉴权 key)。演示态(无 key)可直接清;或重启服务自动清陈旧——服务启动会只保留今日记录。'); return; }
  load();
};
load();
</script>
</body>
</html>
