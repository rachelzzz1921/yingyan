<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#c8d2dc">
<title>药店医保结算终端 · 追溯码即查(演示靶站)</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/plugin-host.css">
</head>
<body>
<div class="host-desk">
  <div class="host-topbar">
    <a class="back" href="/plugins.html#regulator">← 工具箱</a>
    <a class="back" href="/home.html">← 三入口</a>
    <span class="hint">演示靶站 · 仿真飞检现场的药店医保结算终端。扫一盒药的追溯码，鹰眼以插件浮窗即刻判断是否回流药 / 重复结算。</span>
  </div>

  <div class="pos-shell">
    <div class="pos-head">
      <b>💳 医保结算终端 · 示范大药房</b>
      <span class="tag">POS v3.1</span>
    </div>
    <div class="pos-screen">
      <div class="pos-line"><span class="nm">阿托伐他汀钙片 20mg×7</span><span class="amt">¥100.00</span></div>
      <div class="pos-line"><span class="nm">追溯码</span><span class="amt" id="curCode">8590 7831 1600 0000 0214</span></div>
      <div class="pos-scan">
        <label>扫码枪 / 手动录入追溯码</label>
        <div class="row">
          <input id="code" value="85907831160000000214" aria-label="追溯码">
          <button id="scanBtn" type="button">🔍 核验</button>
        </div>
      </div>
    </div>
    <div class="pos-foot">演示重复码：85907831160000000214 · 本终端只查演示数据集，生产接真实追溯码库</div>
  </div>
</div>

<script src="/plugin-overlay.js"></script>
<script>
function esc(v){return String(v==null?'':v).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function money(n){return Number(n||0).toLocaleString('zh-CN');}

async function lookup(code){
  var r=await fetch('/api/regulator/trace-lookup?code='+encodeURIComponent(code)).then(function(x){return x.json();});
  if(r.error) throw new Error(r.error);
  return r;
}
function scan(){
  var code=document.getElementById('code').value.trim();
  if(!code) return;
  document.getElementById('curCode').textContent=code.replace(/(.{4})/g,'$1 ').trim();
  var yy=YY.panel({title:'鹰眼 · 追溯码即查', sub:'正在核验追溯码…', accent:'#DC4A3D'});
  yy.loading('正在比对追溯码 '+esc(code)+'…');
  lookup(code).then(function(r){ render(yy,r,code); })
    .catch(function(e){ yy.body('<div style="padding:16px;color:#b91c1c">核验失败:'+esc(e.message)+'</div>'); });
}
function render(yy,r,code){
  var tier=r.repeated?'A':'C';
  yy.sub(r.repeated?'⚠ 命中重复结算线索':'未命中重复结算线索');
  yy.chips([{text:tier+(r.repeated?' 重点核查':' 暂缓观察'),bg:r.repeated?'#b91c1c':'#0a7a4b'}]);
  var rows=(r.rows||[]).map(function(row){
    return '<div style="padding:8px 14px;border-bottom:1px solid #f2f5f9;font-size:12.5px"><b>'+esc(row.settle_date)+'</b> · '+esc(row.item_name)+' · <span style="font-family:monospace">¥'+money(row.amount)+'</span><br><span style="color:#98a6b5">'+esc(row.dept)+' · '+esc(row.doctor)+' · 行号 '+esc(row.row_id)+'</span></div>';
  }).join('');
  yy.body(
    '<div style="padding:12px 14px;background:'+(r.repeated?'#fdecea':'#f0fbf7')+';border-bottom:1px solid #edf1f6">'+
      '<div style="font-size:15px;font-weight:800;color:'+(r.repeated?'#b91c1c':'#0a7a4b')+'">'+(r.repeated?'🔴 A · 建议重点核查':'🟢 C · 建议暂缓 / 观察')+'</div>'+
      '<div style="font-size:12px;color:#5b6d82;margin-top:4px">'+esc(r.explanation)+'</div></div>'+
    (rows?'<div style="padding:8px 14px;font-size:12px;font-weight:700;color:#33475b;background:#fafbfc">该追溯码关联的结算行</div>'+rows:'')+
    (r.repeated?'<div style="padding:10px 14px;font-size:12px;color:#5b6d82">建议动作：核对首笔结算、退药冲正记录、药品实物流向与参保人购药记录。</div>':''));
  yy.actions([{label:'加入现场线索单',kind:'primary',onClick:function(){ yy.close(); }},{label:'判例速查',href:'/regulator-cases.html'}]);
  yy.footer('复用行级筛查 TRACE-101 · 本地运行 · AI 只提示线索，处置由检查组认定');
}
document.getElementById('scanBtn').addEventListener('click',scan);
document.getElementById('code').addEventListener('keydown',function(e){if(e.key==='Enter')scan();});
YY.launcher({label:'鹰眼追溯助手 · 已注入', hint:'扫码即查回流药 / 重复结算', onClick:scan});
</script>
</body>
</html>
