      interval = 本次入院 - 前次出院
      IF interval ≤ N(默认15) AND 主诊断相同/高度相关:
        检查加重情节{前次出院记录'病情未愈/建议近期再入院', 两次方案连续, 前次费用临近支付标准上限}
        IF 命中加重情节 AND 本次入院无新发病情医学说明: 命中
      ★除外检查(肿瘤场景必跑): IF 命中放化疗周期白名单(规律周期住院): 不输出
      命中且未除外 → 疑点
