      false_positive_count: 0
      review_log: ["政策审：38条(二)(六)+目录备注+指导原则均KB可检索✓", "临床审：补全除外(贝伐等抗血管生成无需检测/说明书未要求检测者)✓", "工程审：触发器=结算明确靶点药，三态可判✓"]

