####################################################################
# 鹰眼 · 医保基金稽核规则库（全量机读版）rules.yaml
# 版本：v0.2  生成日期：2026-06-12
# 规则总数：41（通用33 + 肿瘤8）
# Schema：见主文档 3.2 节
# 法规基准：《医疗保障基金使用监督管理条例》(国务院令735号)
#          +《实施细则》(国家医保局令第7号, 2026-04-01施行)
# 用途：原型引擎加载；L1由代码执行，L2/L3由Agent(LLM)读病历执行
# 字段说明：
#   layer: L1确定性(代码) / L2语义(LLM读病历) / L3线索(需跨病历或外部数据)
#   output_modes: 该规则可能的输出态(疑点/线索/不输出)及其分流条件
#   trigger_logic: 写给引擎/Agent的判定指令(自然语言+伪代码)
#   evidence_min_set: 最小证据集，缺一不可输出为"疑点"(降级为线索或不输出)
#   exclusions: 除外/误报防控(宁漏报不误报的关键字段)
####################################################################

meta:
  schema_version: "3.2"
  rules_version: "v0.2"
  generated_date: "2026-06-12"
  total_rules: 41
  three_element_gate: ["原始证据定位", "违反的政策条款原文", "完整推理过程"]
  output_states: ["疑点", "线索", "不输出"]
  execution_order:
    - "先跑 F 类(L1)确定性规则 → 建立校验锚点"
    - "再按三方验证轴跑 L2 语义规则"
    - "命中后强制取证 → 三要素门禁 → 风险分级"
    - "L1结果用于校验L2输出，冲突时以L1为准并标记复核"
  global_params:
    decompose_admission_interval_days: 15   # C-301 分解住院间隔阈值(7-31按统筹区配置)
    discharge_med_days_acute: 7             # B-206 急性病出院带药天数
    discharge_med_days_chronic: 14          # B-206 慢性病出院带药天数
    discharge_med_days_special: 30          # B-206 特殊慢病出院带药天数
    bed_idle_days_for_ghost: 3              # C-302 挂床住院连续无记录天数阈值
    oncology_cycle_whitelist: true          # C-301 肿瘤放化疗周期白名单总开关
  # 规则准入治理：三审三验流水线（详见05号文档第4节）
  governance_model:
    state_machine: "draft → in_review(三审) → shadow(三验/影子期) → active(在役) → re_review/deprecated"
    三审: ["政策合规审(policy_basis须在KB1检索到原文)", "临床合理审(用KB2反查合理情形补全exclusions)", "工程可执行审(trigger_logic对任意材料包产出三态之一)"]
    三验: ["红蓝对抗(每条≥3阳性+≥3阴性干扰用例)", "双盲一致性(两实例独立判定一致率<90%须重写)", "影子运行(历史已复核材料静默跑,误报率>10%不准入或永久降级线索)"]
    在役治理: ["复核'误报'标记≥3次自动re_review", "KB1条款effective_to到期自动deprecated挂接规则"]
    pitch金句: "疑点有三要素门禁，规则进库要过三审三验——规则本身也有证据链。"
  # doc08宏观③ 全局豁免清单（合法的异常，仲裁层统一应用，不靠各规则自己写exclusions）
  global_suppression_list:
    - {scene: "放化疗周期规律住院", suppresses: [C-301, C-302], basis: "KB2-肿瘤化疗周期方案"}
    - {scene: "血透按疗程规律住院", suppresses: [C-301], basis: "临床常规"}
    - {scene: "DRG特例单议病例", suppresses: [D-401, T-208], basis: "DRG出院5%/DIP 5‰以内"}
    - {scene: "急诊新发/转诊转院", suppresses: [C-301], basis: "条例除外"}
  # doc08第二部分 规则类全景（6大类已建 + G/H路线图，pitch架构图画全8类体现"违规全景"认知）
  category_roadmap:
    已建: {F: "基础逻辑", A: "收费合规", B: "诊疗合理", C: "住院行为", D: "支付方式", E: "资质数据/对抗"}
    路线图: {G: "时序与跨就诊(同患者短期跨机构重复/慢病配药节奏突变/住院-门诊腾挪，依赖批量数据底座)", H: "统计离群(单价/用量显著偏离同类病例分布，无需先验规则即可发现新型违规，依赖群体数据)"}
    其他缺口: ["门诊/药店场景(回流药/串换/超量,2026监管重点)", "耗材专项(无指征植入/数量与手术不符/高值串低值,骨科备演用)", "服务不足(路径关键环节缺失,联KB2临床路径)"]

rules:

# ================================================================
# F 基础逻辑类（L1 · 6条）—— 底线规则，纯代码可实现
# ================================================================

  - rule_id: F-001
    rule_name: 性别—项目冲突
    category: F基础逻辑
    violation_type: 虚记/串换线索
    layer: L1确定性
    risk_level: 高
    applies_to: [住院, 门诊]
    specialty_tags: [通用]
    trigger_logic: |
      对每条费用行，查"性别限定项目对照表"：
      IF 患者性别 == 男 AND 项目 ∈ {宫腔镜,产科类,宫颈刮片,人工流产,...女性专属}: 命中
      IF 患者性别 == 女 AND 项目 ∈ {前列腺类,精液检查,...男性专属}: 命中
      命中 → 疑点(同时输出"核对身份信息"提示，防性别登记错误)
    evidence_min_set: ["费用行(项目名+金额)", "病案首页性别"]
    output_modes:
      疑点: "性别与项目冲突且非登记错误"
      线索: "疑似性别登记错误(需核对身份)"
    exclusions: "性别登记错误的，需同时输出'核对身份信息'提示，不直接定虚记"
    policy_basis: ["KB1-条例-第38条(四)", "KB1-条例-第40条(三)"]
    kb2_refs: []
    params: {gender_restricted_table: "KB1-性别限定项目对照表"}
    demo_seed: "男性患者费用清单含'宫颈刮片'"

  - rule_id: F-002
    rule_name: 年龄—项目冲突
    category: F基础逻辑
    violation_type: 虚记/串换
    layer: L1确定性
    risk_level: 高
    applies_to: [住院, 门诊]
    specialty_tags: [通用]
    trigger_logic: |
      计算患者年龄 = 就诊日期 - 出生日期
      查"年龄适用人群对照表"：
      IF 项目=新生儿护理 AND 年龄>28天: 命中
      IF 项目=老年综合评估 AND 年龄<60: 命中
      命中 → 疑点
    evidence_min_set: ["费用行", "病案首页出生日期"]
    output_modes: {疑点: "年龄与项目适用人群明确冲突"}
    exclusions: "年龄登记错误需提示核对"
    policy_basis: ["KB1-条例-第38条(四)"]
    kb2_refs: []
    params: {age_restricted_table: "KB1-年龄适用人群对照表"}
    demo_seed: "成人患者收'新生儿护理'"

  - rule_id: F-003
    rule_name: 时间逻辑冲突
    category: F基础逻辑
    violation_type: 虚构服务项目候选
    layer: L1确定性
    risk_level: 高
    applies_to: [住院, 门诊]
    specialty_tags: [通用]
    trigger_logic: |
      对每条费用行的发生日期 fee_date 做时间一致性校验：
      IF fee_date > 出院日期 OR fee_date > 死亡日期: 命中(出院/死亡后计费)
      IF 手术收费日期 < 入院日期: 命中
      IF 麻醉时间 与 手术记录时间 矛盾: 命中
      命中 → 疑点(L1确定性，无需语义判断)
    evidence_min_set: ["费用行(含日期)", "病案首页出入院/死亡时间", "(如涉)相关记录单原文"]
    output_modes: {疑点: "时间逻辑硬冲突"}
    exclusions: "跨日连续操作的合理记录(如术中转日)需读记录确认，升级L2"
    policy_basis: ["KB1-条例-第40条(三)", "KB1-条例-第38条(六)"]
    kb2_refs: []
    params: {}
    demo_seed: "出院日(2026-03-20)次日(03-21)仍计二级护理+输液费"

  - rule_id: F-004
    rule_name: 单日计量超物理上限
    category: F基础逻辑
    violation_type: 超量计费
    layer: L1确定性
    risk_level: 高
    applies_to: [住院]
    specialty_tags: [通用]
    trigger_logic: |
      对按时间/次数计量的项目，按 fee_date 聚合单日累计量：
      IF 单日(吸氧时长) > 24h: 命中
      IF 单日(护理时长) > 24h: 命中
      IF 同一时刻 存在≥2台全麻手术(同一患者): 命中
      命中 → 疑点
    evidence_min_set: ["费用行(项目+数量+日期)", "max_per_day参数"]
    output_modes: {疑点: "单日计量超物理上限"}
    exclusions: ""
    policy_basis: ["KB1-条例-第38条(二)"]
    kb2_refs: []
    params: {max_per_day: "按项目配置(吸氧24h/护理24h/...)"}
    demo_seed: "单日'持续吸氧'计费30小时"

  - rule_id: F-005
    rule_name: 互斥项目同时计费
    category: F基础逻辑
    violation_type: 重复收费
    layer: L1确定性
    risk_level: 中—高
    applies_to: [住院, 门诊]
    specialty_tags: [通用]
    trigger_logic: |
      查"互斥项目对照表"，对同一天/同一时段费用行做互斥校验：
      IF (同一静脉通道) AND (静脉输液 AND 静脉注射 并收): 命中
      IF (同台手术) AND (全麻 AND 局麻 并收): 命中
      命中 → 疑点(若病历记载确有两次独立操作则除外，升级L2确认)
    evidence_min_set: ["互斥费用行对", "互斥对照表条目"]
    output_modes:
      疑点: "互斥且无独立操作记录支撑"
      线索: "需读记录确认是否独立操作"
    exclusions: "病历记载确有两次独立操作的不触发(除外判断升级L2由Agent读记录确认)"
    policy_basis: ["KB1-条例-第38条(三)"]
    kb2_refs: []
    params: {mutex_table: "KB1-互斥项目对照表"}
    demo_seed: "同一静脉通道'静脉输液'与'静脉注射'同时段并收"

  - rule_id: F-006
    rule_name: 限频项目超频次
    category: F基础逻辑
    violation_type: 重复收费
    layer: L1确定性
    risk_level: 中
    applies_to: [住院, 门诊]
    specialty_tags: [通用]
    trigger_logic: |
      查"限频项目表"(每日1次/每住院1次)：
      聚合该项目在限频周期内的计费次数 cnt
      IF cnt > 限频上限: 命中(超出部分为违规)
      命中 → 疑点
    evidence_min_set: ["费用行(项目+次数+日期)", "限频表条目"]
    output_modes: {疑点: "超限频计费"}
    exclusions: "确有医学必要的重复(需病历支撑)升级L2"
    policy_basis: ["KB1-条例-第38条(三)"]
    kb2_refs: []
    params: {freq_limit_table: "从地方价格项目规范导入"}
    demo_seed: "入院诊查费(限每住院1次)重复计费2次"

# ================================================================
# A 收费合规类（10条）
# ================================================================

  - rule_id: A-101
    rule_name: 重复收费—项目内涵已包含
    category: A收费合规
    violation_type: 重复收费
    layer: L2语义
    risk_level: 高
    applies_to: [住院, 门诊]
    specialty_tags: [通用, 骨科, 心血管内科]
    trigger_logic: |
      对同时出现的费用行 X、Y：
      读取 KB1 中 X 的"项目内涵"条文
      IF Y ∈ X.项目内涵 AND Y ∉ X.除外内容: 命中(Y属X内涵不应另收)
      (如涉操作)需读手术/操作记录确认确为同一次操作
      命中 → 疑点
    evidence_min_set: ["两条费用行", "项目内涵条文原文", "(如涉)手术/操作记录原文"]
    output_modes: {疑点: "Y属X内涵且非除外内容，证据闭环", 线索: "内涵归属存疑需价格部门确认"}
    exclusions: "内涵条文标注'除外内容可另收'的；同日两次独立操作有记录支撑的"
    policy_basis: ["KB1-条例-第38条(三)", "KB1-立项指南-椎体成形费-内涵"]
    kb2_refs: []
    params: {connotation_kb: "KB1-立项指南-项目内涵"}
    demo_seed: "收'经皮椎体成形术'同时另收'椎体穿刺术'；'心电监护'同日另收'血氧饱和度监测'"

  - rule_id: A-102
    rule_name: 重复收费—同义/包含项目并收
    category: A收费合规
    violation_type: 重复收费
    layer: L2语义
    risk_level: 高
    applies_to: [住院, 门诊]
    specialty_tags: [通用]
    trigger_logic: |
      查"同义/包含项目映射表"，对费用行做同义归一：
      IF 两费用行映射到同一服务(不同名称/编码): 命中(重复)
      例:'特级护理'与'重症监护'同日并收；同一检验以单项+组套双收
      命中 → 疑点
    evidence_min_set: ["费用行对", "同义映射表依据"]
    output_modes: {疑点: "同义并收证据闭环"}
    exclusions: "确为两个不同服务的(需依据区分)"
    policy_basis: ["KB1-条例-第38条(三)"]
    kb2_refs: []
    params: {synonym_map: "KB1-同义映射表"}
    demo_seed: "'特级护理'与'重症监护'同日并收"

  - rule_id: A-103
    rule_name: 超标准收费—单价超物价标准
    category: A收费合规
    violation_type: 超标准收费
    layer: L1确定性
    risk_level: 高
    applies_to: [住院, 门诊]
    specialty_tags: [通用]
    trigger_logic: |
      对每条费用行：
      查地方价格目录公示价 std_price(按就诊日期取版本)
      IF 结算单价 > std_price: 命中(超出部分违规)
      命中 → 疑点
    evidence_min_set: ["费用行(单价)", "地方价格目录公示价(行级引用)"]
    output_modes: {疑点: "单价超公示价"}
    exclusions: "新增项目尚无目录价的；不同规格对应不同价的需匹配规格"
    policy_basis: ["KB1-条例-第38条(三)"]
    kb2_refs: []
    params: {price_catalog: "KB1-江苏价格目录(覆盖层，待抓取)"}
    demo_seed: "demo若不锚定具体省份，此条做演示桩；江苏覆盖层抓取后启用"

  - rule_id: A-104
    rule_name: 超标准收费—扩大计价单位/数量
    category: A收费合规
    violation_type: 超标准收费
    layer: L2语义
    risk_level: 高
    applies_to: [住院, 门诊]
    specialty_tags: [通用, 康复, 医学影像]
    trigger_logic: |
      读取价格项目"计价单位"条文：
      IF 按"次"计价项目被按部位/小时叠加计多次: 命中
      需比对治疗记录确认实际操作单位
      命中 → 疑点
    evidence_min_set: ["费用行(数量)", "价格项目计价单位条文", "治疗记录原文"]
    output_modes: {疑点: "计价单位与记录不符", 线索: "记录不足以判定"}
    exclusions: "确有多部位独立治疗且记录支撑的"
    policy_basis: ["KB1-条例-第38条(三)"]
    kb2_refs: []
    params: {pricing_unit_kb: "KB1-价格目录-计价单位"}
    demo_seed: "理疗一次治疗拆多部位计多次"

  - rule_id: A-105
    rule_name: 超标准收费—护理等级与实际不符
    category: A收费合规
    violation_type: 超标准收费
    layer: L2语义
    risk_level: 高
    applies_to: [住院]
    specialty_tags: [通用, 肿瘤, 重症医学]
    trigger_logic: |
      提取护理费用行的收费护理等级 charged_level
      提取护理医嘱的医嘱护理等级 ordered_level
      读护理记录单的巡视频次/记录密度 actual_freq
      IF charged_level 高于 ordered_level: 命中(超等级收费)
      OR IF actual_freq 不满足 charged_level 要求的巡视/记录标准: 命中
      命中 → 疑点(差额=(高等级价-应收等级价)×天数)
    evidence_min_set: ["护理费用行", "护理医嘱原文", "护理记录单(巡视频次)"]
    output_modes: {疑点: "收费等级>医嘱等级或记录不支撑"}
    exclusions: "病情变化致护理升级有医嘱及记录支撑的"
    policy_basis: ["KB1-条例-第38条(三)"]
    kb2_refs: []
    params: {nursing_price: "一级/二级/三级护理单价(江苏价格目录)"}
    demo_seed: "医嘱'二级护理'，全程按'一级护理'计费(本案预埋点#4)"

  - rule_id: A-106
    rule_name: 分解项目收费
    category: A收费合规
    violation_type: 分解项目收费
    layer: L2语义
    risk_level: 高
    applies_to: [住院, 门诊]
    specialty_tags: [通用, 骨科, 临床检验]
    trigger_logic: |
      读打包项目内涵：
      IF 将打包项目拆分为多个子项分别计费 AND 子项∈打包内涵: 命中
      OR IF 组套检验拆单项叠加 AND 合计>组套价: 命中
      命中 → 疑点(附价格对比计算过程)
    evidence_min_set: ["费用行组", "打包项目内涵条文", "价格对比计算过程"]
    output_modes: {疑点: "分解收费证据闭环"}
    exclusions: "内涵允许分项收费的"
    policy_basis: ["KB1-条例-第38条(三)", "KB1-立项指南-椎体成形费-内涵"]
    kb2_refs: []
    params: {bundle_kb: "KB1-立项指南-打包项目"}
    demo_seed: "手术含的常规缝合、冲洗拆开收；组套检验拆单项叠加"

  - rule_id: A-107
    rule_name: 串换药品/耗材/诊疗项目
    category: A收费合规
    violation_type: 串换药品耗材诊疗项目
    layer: L2语义
    risk_level: 高
    applies_to: [住院, 门诊]
    specialty_tags: [通用, 口腔, 中医]
