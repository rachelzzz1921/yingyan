    category: B诊疗合理
    violation_type: 串换/无指征/范围外（依证据落条款）
    layer: L2语义
    risk_level: 高
    applies_to: [住院, 门诊]
    specialty_tags: [肿瘤]
    trigger_logic: |
      ★★首推演示规则。
      1) 提取医保结算的抗肿瘤药 → 查是否属"明确作用靶点"类(命中KB2必检清单:EGFR-TKI/ALK抑制剂/...)
      2) IF 是: 在{检验,病理,外送基因检测报告}检索对应靶点结果
      3) 三态分流：
         IF 无任何检测报告 且 药已用 → 疑点(违反指导原则"不得未做检测盲目用药")
         IF 报告存在但靶点阴性/野生型 仍用 → 疑点(无适应症/无指征)
         IF 病历提示"外院已检测"但本包无报告 → 线索(列调阅清单:外院基因检测报告)
    evidence_min_set: ["靶向药费用行", "病理诊断原文", "基因检测报告(或其缺失的核对说明)", "指导原则/说明书引用", "目录备注引用"]
    output_modes:
      疑点: "无检测报告且已用药 或 报告靶点阴性仍用"
      线索: "病历提示外院已检测但本包无报告"
    exclusions: "★无需检测的抗血管生成类(贝伐珠单抗)后线用药；说明书未要求检测的药品"
    policy_basis: ["KB1-条例-第38条(二)", "KB1-条例-第38条(六)", "KB1-目录2025-西药-奥希替尼-备注", "KB2-指导原则2025-靶点检测原则", "KB2-指导原则2025-EGFR-TKI用药要点"]
    kb2_refs: ["KB2-指导原则2025-靶点检测原则", "KB2-病种包-NSCLC", "KB2-指导原则2025-EGFR-TKI用药要点"]
    params: {target_required_drugs: ["奥希替尼", "吉非替尼", "厄洛替尼", "阿来替尼", "克唑替尼", "西妥昔单抗"]}
    policy_attribution_note: "★核验纠偏(2026-06-12)：2025版国家'典型问题清单·肿瘤'15条(序号139-153)全部为收费/计价/串换类，无'靶向药无基因检测'条目。故本规则不挂'问题清单·肿瘤'名下，依据为《条例》38条(二)违反诊疗规范过度诊疗 + 38条(六)超限定支付范围 + 药品目录备注 + 抗肿瘤指导原则2025版靶点检测原则。"
    demo_seed: "肺腺癌患者病程'建议靶向治疗'，结算奥希替尼28天，全材料无EGFR检测报告(本案预埋点#1，金额最大)"
    governance:
      status: active
      test_cases_positive: 4
