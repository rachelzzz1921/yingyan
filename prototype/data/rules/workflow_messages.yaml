# 三态文案 + 官方挂接（schema 3.3）— build-rules.js 合并进 rules.json
# tone: block=政策类可拦截 · suggest=医疗类仅提示（医师法诊疗自主权）

F-001:
  official:
    gz_codes: [GZ10000302004000]
    tier1: 政策类
    tier2: 医疗服务项目政策限定类
  effective_interval: { from: "2023-05-15", to: null }
  code_set_refs: [gender_services_v2024]
  workflow_messages:
    precheck:
      tone: block
      title: 性别与项目冲突
      body: 本次开立项目与患者性别登记不符，请核对身份信息或调整项目。
      disposal: 请核对患者性别与项目适用人群后再开立。
    during:
      basis: 区分性别使用的医疗服务项目与患者性别矛盾
      action: 拒付或责令退回相应费用
      denial_text: 患者性别与收费项目适用性别不符，涉嫌虚构医药服务项目。
    post_audit:
      lead: 性别—项目硬互斥
      evidence_hint: 费用行项目名 + 病案首页性别 + 区分性别使用清单条目

F-002:
  official:
    gz_codes: [GZ10000101007000, GZ10000101006000]
    tier1: 政策类
    tier2: 药品政策限定类
  effective_interval: { from: "2023-05-15", to: null }
  code_set_refs: [child_drugs_v2024]
  workflow_messages:
    precheck:
      tone: block
      title: 年龄与项目/药品不符
      body: 该项目或药品有年龄限定，当前患者年龄不在适用范围内。
      disposal: 请确认患者年龄符合医保支付限定后再开立。
    during:
      basis: 医保目录年龄限定支付范围
      action: 拒付超年龄限定部分
      denial_text: 收费项目或药品超出目录年龄限定支付范围。
    post_audit:
      lead: 年龄—项目/药品冲突
      evidence_hint: 费用行 + 出生日期/年龄 + 目录限定条款

F-003:
  official:
    gz_codes: [GZ10000201003000]
    tier1: 管理类
    tier2: 信息数据监管类
  effective_interval: { from: "2023-05-15", to: null }
  workflow_messages:
    precheck:
      tone: suggest
      title: 费用日期异常
      body: 开立日期与在院时段可能不一致，请核对计费时点。
      disposal: 请确认费用发生时间在合理诊疗时段内。
    during:
      basis: 出院/死亡后仍发生费用或时间逻辑矛盾
      action: 拒付出院后计费部分
      denial_text: 费用发生日晚于出院日期，对应服务不可能发生。
    post_audit:
      lead: 时间逻辑硬冲突
      evidence_hint: 费用行日期 + 出院小结/病案首页出院时间

F-004:
  official:
    gz_codes: [GZ10000102014000]
    tier1: 政策类
    tier2: 医疗服务项目政策限定类
  effective_interval: { from: "2023-05-15", to: null }
  workflow_messages:
    precheck:
      tone: block
      title: 单日计量超物理上限
      body: 按小时计费项目单日累计超过24小时，请核对计费数量。
      disposal: 请修正计费数量或补充合理说明。
    during:
      basis: 单日计时项目超物理上限
      action: 核减超量部分
      denial_text: 同一计时项目单日累计超过24小时，物理上不可能。
    post_audit:
      lead: 单日计量超上限
      evidence_hint: 同日费用行聚合数量 + 项目计价单位

F-006:
  official:
    gz_codes: [GZ10000101009000, GZ10000101010000, GZ10000102014000]
    tier1: 政策类
    tier2: 药品政策限定类
  effective_interval: { from: "2023-05-15", to: null }
  workflow_messages:
    precheck:
      tone: block
      title: 超频次/超疗程
      body: 该项目或药品已超过政策允许的支付频次或疗程上限。
      disposal: 请确认是否符合疗程/频次限定后再开立。
    during:
      basis: 医保目录疗程或频次限定
      action: 拒付超限部分
      denial_text: 超过目录规定的最大支付天数、开药量或频次上限。
    post_audit:
      lead: 限频/疗程超限
      evidence_hint: 费用行聚合次数 + 规则依据中的天数/次数上限

A-102:
  official:
    gz_codes: [GZ10000102012000]
    tier1: 政策类
    tier2: 医疗服务项目政策限定类
  effective_interval: { from: "2023-05-15", to: null }
  workflow_messages:
    precheck:
      tone: block
      title: 疑似重复/互斥收费
      body: 本次医嘱中存在内涵包含或互斥的项目组合，请核对是否应合并计价。
      disposal: 请确认项目内涵，避免重复收费。
    during:
      basis: 医疗服务项目重复收费（内涵包含或不得另行收费）
      action: 拒付重复计价部分
      denial_text: 同一时段互斥或包含关系项目重复收费。
    post_audit:
      lead: 互斥/重复收费
      evidence_hint: 互斥项目对 + 同日费用行 + 立项指南内涵

A-105:
  official:
    gz_codes: [GZ10000302005000]
    tier1: 医疗类
    tier2: 医疗服务项目合理使用类
  effective_interval: { from: "2023-05-15", to: null }
  workflow_messages:
    precheck:
      tone: suggest
      title: 护理等级与医嘱不一致
      body: 收费护理等级高于医嘱护理等级，请核对护理记录。
      disposal: 请确认护理等级与医嘱、护理记录一致。
    during:
      basis: 护理等级收费与医嘱/记录不符
      action: 按实际护理等级核减差额
      denial_text: 收费护理等级高于医嘱或护理记录支持的等级。
    post_audit:
      lead: 护理等级不符
      evidence_hint: 费用行护理等级 + 长期医嘱 + 护理记录

B-201-IND:
  official:
    gz_codes: [GZ10000101008000, GZ10000301002000]
    tier1: 医疗类
    tier2: 药品合理使用类
  effective_interval: { from: "2023-05-15", to: null }
  workflow_messages:
    precheck:
      tone: suggest
      title: 适应症证据不足
      body: 该药品有适应症或限定支付要求，当前诊断/证据可能不足以支持医保支付。
      disposal: 请补充适应症支撑材料；不符合限定应自费告知。
    during:
      basis: 药品超适应症或超限定支付范围
      action: 拒付或转为自费
      denial_text: 用药超出医保目录适应症或限定支付情形。
    post_audit:
      lead: 适应症/限定支付线索
      evidence_hint: 费用行药品 + 诊断 + 病程/检验证据

B-209:
  official:
    gz_codes: [GZ10000101005000]
    tier1: 政策类
