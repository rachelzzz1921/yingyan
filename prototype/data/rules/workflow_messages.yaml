    precheck:
      tone: suggest
      title: 二线用药证据
      body: 二线药品通常需一线治疗失败或不耐受证据，请确认是否已满足。
      disposal: 请补充一线治疗无效/不耐受记录后再开立。
    during:
      basis: 医保目录限二线使用
      action: 拒付缺乏二线指征部分
      denial_text: 使用二线药品但未见一线治疗失败或不耐受证据。
    post_audit:
      lead: 二线用药线索
      evidence_hint: 用药记录 + 一线治疗史 + 目录备注

