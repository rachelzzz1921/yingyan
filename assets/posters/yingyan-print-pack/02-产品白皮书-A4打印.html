<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鹰眼 EAGLEEYE · 产品白皮书</title>
  <style>
    :root{
      --ink:#0b1f35;--navy:#0b2a4a;--blue:#002fa7;--teal:#14b8a6;--amber:#e8a838;--red:#dc4a3d;--green:#0d9b6a;
      --paper:#fbfcf8;--soft:#f2f6fa;--line:#d8dee5;--muted:#5f7082;--card:#fff;
      --sans:"Inter","Helvetica Neue","PingFang SC","Noto Sans SC","Microsoft YaHei",Arial,sans-serif;
      --mono:"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
    }
    *{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    body{margin:0;padding:22px;background:#e5e7eb;color:var(--ink);font-family:var(--sans)}
    .pack{display:grid;gap:22px;justify-items:center}
    .page{width:794px;height:1123px;position:relative;overflow:hidden;padding:36px 46px 30px;background:linear-gradient(180deg,#fbfcf8 0%,#f7fbff 100%);box-shadow:0 16px 44px rgba(15,23,42,.14);page-break-after:always}
    .page:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 94% 6%,rgba(45,212,191,.14),transparent 22%),radial-gradient(circle at 4% 98%,rgba(0,47,167,.06),transparent 26%),radial-gradient(rgba(11,42,74,.05) .6px,transparent .6px);background-size:auto,auto,20px 20px;pointer-events:none;opacity:1}
    .page:after{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:linear-gradient(180deg,var(--blue),var(--teal) 55%,var(--amber));opacity:.9}
    .content{position:relative;z-index:1;height:100%;display:flex;flex-direction:column}
    header{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:14px;color:var(--muted);font:11px var(--mono);letter-spacing:.08em;text-transform:uppercase}
    .brand{display:flex;align-items:center;gap:10px;font-family:var(--sans);letter-spacing:0;text-transform:none;color:var(--ink);font-weight:850}
    .brand img{width:34px;height:34px;border-radius:9px}.brand b{font-size:17px}
    .brand em{font-style:normal;font:800 10px var(--mono);letter-spacing:.14em;color:var(--blue);margin-left:2px}
    .eyebrow{font:800 11px var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin-bottom:8px}
    h1,h2,h3,p{margin:0}
    h1{font-size:46px;line-height:1.0;letter-spacing:-.045em;font-weight:900}
    h2{font-size:38px;line-height:1.05;letter-spacing:-.04em;font-weight:900}
    h3{font-size:17px;line-height:1.18;letter-spacing:-.02em;font-weight:850}

    .accent{color:var(--blue)}.teal{color:var(--teal)}.red{color:var(--red)}.amber{color:var(--amber)}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.grid4{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

    .card.hot{background:#eef7ff;border-color:#bfd7ff}.card.warn{background:#fff8e8;border-color:#ecd69a}.card.green{background:#e8f7f0;border-color:#bfe8d3}
    .label{font-size:14px;font-weight:850;margin-bottom:4px}.desc{font-size:11.6px;line-height:1.46;color:var(--muted)}
    .num{font:900 30px/1 var(--mono);letter-spacing:-.06em;color:var(--blue);margin-bottom:4px}
    .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}.tag{border:1px solid #bdd0e6;background:#fff;color:#134e72;border-radius:999px;padding:5px 9px;font:800 9px var(--mono);letter-spacing:.06em}

    .timeline{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.step{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px;min-height:88px}.step b{display:block;font:850 13px var(--mono);color:var(--blue);margin-bottom:5px}.step span{display:block;font-size:11.5px;font-weight:850;line-height:1.26}.step small{display:block;margin-top:5px;font-size:10.5px;color:var(--muted);line-height:1.34}
    table{width:100%;border-collapse:collapse;font-size:11px;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden}th,td{border-bottom:1px solid var(--line);padding:6px 8px;text-align:left;vertical-align:top}th{background:#f3f7fb;color:#42566b;font:800 10px var(--mono);letter-spacing:.05em}tr:last-child td{border-bottom:none}

    .ui-pane{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden}.ui-head{display:flex;justify-content:space-between;padding:7px 9px;background:#f8fafc;border-bottom:1px solid var(--line);font-weight:850;color:#0b2a4a}
    .ui-body{padding:8px}.ui-line{padding:4px 0;border-bottom:1px dashed #e8edf3}.ui-hi{background:#fff8e8;border-left:3px solid var(--amber);padding:5px 7px;border-radius:0 6px 6px 0;margin:5px 0;color:#7a4d00}
    .ui-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:7px}.ui-k{border:1px solid var(--line);border-radius:8px;background:#fbfcfe;padding:6px}.ui-k b{display:block;font:900 15px var(--mono);color:var(--blue)}.ui-k span{font-size:9px;color:var(--muted)}
    .finding{border:1px solid var(--line);border-left:4px solid var(--red);border-radius:9px;background:#fff;overflow:hidden;margin-bottom:6px}.finding.clue{border-left-color:var(--amber)}.finding.ok{border-left-color:var(--green)}
    .fhead{display:flex;align-items:center;gap:6px;padding:6px 7px;border-bottom:1px solid #eef2f6}.badge{font:800 9px var(--sans);padding:2px 6px;border-radius:999px;background:#fef0ee;color:var(--red);white-space:nowrap}.badge.clue{background:#fff6e6;color:#9a6700}.badge.ok{background:#e8f7f0;color:var(--green)}.fhead b{font-size:10.5px;color:var(--ink)}
    .ec{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:6px;background:#fbfcfe}.ev{border:1px solid var(--line);border-radius:7px;background:#fff;padding:5px;font-size:9.2px}.ev i{display:block;font-style:normal;color:#134e72;font:800 8.5px var(--mono);margin-bottom:2px}
    .matrix{display:grid;grid-template-columns:92px repeat(3,1fr);gap:6px}.cell{background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px;min-height:60px}.cell.head{display:grid;place-items:center;background:#0b2a4a;color:#fff;font-weight:850;text-align:center}.cell b{font-size:12px}.cell p{font-size:10.5px;color:var(--muted);line-height:1.35;margin-top:3px}
    .arch-board{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .arch-stack{display:grid;gap:6px}.arch-row{display:grid;grid-template-columns:66px 1fr;gap:7px;align-items:stretch}.arch-row b{display:grid;place-items:center;border-radius:9px;background:#0b2a4a;color:#fff;font:850 12px var(--sans);text-align:center;line-height:1.1;padding:2px}.arch-row div{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 8px}.arch-row strong{display:block;font-size:12px;color:#0b2a4a}.arch-row span{display:block;font-size:10.4px;line-height:1.36;color:var(--muted);margin-top:2px}
    .data-contract{display:grid;gap:8px;align-content:start}.contract{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px}.contract b{font-size:12px;color:#0b2a4a}.contract .flowline{display:grid;gap:4px;margin-top:6px}.contract .flowline span{display:block;padding:5px 7px;background:#f6f8fb;border:1px solid #e1e8f0;border-radius:7px;font-size:10.4px;line-height:1.3;color:#33475b}
    .callout{border:1px solid #c7d8ff;background:#f1f6ff;border-radius:10px;padding:10px 12px}.callout b{display:block;font-size:12.5px;color:#002fa7;margin-bottom:4px}.callout p{font-size:11.4px;line-height:1.5;color:#304458;margin:0}
    .swimlane{display:grid;grid-template-columns:84px repeat(4,1fr);gap:6px;margin-bottom:2px}.lane{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px;min-height:56px}.lane.role{background:#0b2a4a;color:#fff;display:grid;place-items:center;text-align:center;font-weight:850}.lane b{display:block;font-size:11px;color:#0b2a4a;margin-bottom:3px}.lane p{font-size:10px;line-height:1.32;color:var(--muted);margin:0}
    .flow-card{background:#0d1e2f;color:#eaf2f7;border-radius:12px;padding:10px 12px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}.flow-card b{display:block;font-size:12.5px;margin-bottom:6px}.flow-card span{display:block;border-top:1px solid rgba(255,255,255,.12);padding:6px 0;font-size:10.8px;line-height:1.36}
    .mini-ledger{display:grid;gap:6px}.ledger-item{display:grid;grid-template-columns:70px 1fr 60px;gap:8px;align-items:center;border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px}.ledger-item b{font:850 11px var(--mono);color:#0b2a4a}.ledger-item span{font-size:10.4px;color:#41566c}.ledger-item i{font-style:normal;text-align:center;border-radius:999px;padding:3px 5px;font-size:9.5px;font-weight:850;background:#eef7ff;color:#134e72}
    .footer{margin-top:auto;border-top:1px solid var(--line);padding-top:10px;display:flex;justify-content:space-between;align-items:flex-end;gap:12px;color:var(--muted);font:10.5px var(--mono);letter-spacing:.05em}
    .qr{display:flex;align-items:center;gap:8px}.qr img{width:52px;height:52px;background:#fff;padding:5px;border:1px solid var(--line);border-radius:8px}
    .folio{margin-left:auto;text-align:right}
    .story-rail{margin:11px 0 12px;display:grid;grid-template-columns:repeat(10,1fr);gap:3px;color:#94a2b2}
    .story-rail span{border-top:2px solid currentColor;padding-top:4px;font:800 8px/1.15 var(--mono);letter-spacing:.02em;opacity:.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .story-rail span.on{color:var(--blue);opacity:1}
    .dense{display:flex;flex-direction:column}
    .article{columns:2;column-gap:26px;column-rule:1px solid #e3e9ef;margin-top:11px}
    .article p{break-inside:avoid;font-size:12px;line-height:1.74;color:#22384e;text-align:justify;margin:0 0 9px}
    .article p .k{color:var(--blue);font-weight:800}
    /* 填充件：图标要点行 / 小图表 / 结论带 */
    .hl-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
    .hl{display:flex;flex-direction:column;gap:6px;border:1px solid var(--line);border-top:3px solid var(--blue);background:rgba(255,255,255,.94);border-radius:12px;padding:11px 12px 12px;box-shadow:0 2px 8px rgba(11,42,74,.04)}
    .hl img{width:24px;height:24px}
    .hl b{font-size:13px;color:var(--navy);font-weight:850}
    .hl span{font-size:10.8px;line-height:1.46;color:var(--muted)}
    .hl:nth-child(2){border-top-color:var(--teal)}.hl:nth-child(3){border-top-color:var(--amber)}.hl:nth-child(4){border-top-color:var(--red)}
    .meter{margin-top:12px;display:grid;gap:9px;border:1px solid var(--line);background:rgba(255,255,255,.94);border-radius:12px;padding:13px 16px}
    .meter .mrow{display:grid;grid-template-columns:88px 1fr 96px;gap:12px;align-items:center;font-size:12px;color:#33475b;font-weight:600}
    .meter .bar{height:11px;border-radius:999px;background:#e8edf3;overflow:hidden}
    .meter .bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--teal),var(--blue))}
    .meter .mrow b{text-align:right;font:800 13px var(--mono);color:var(--navy)}
    .insight{margin-top:12px;display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:12px;background:linear-gradient(120deg,#0b2a4a,#134e72);color:#fff;box-shadow:0 10px 24px rgba(11,42,74,.2)}
    .insight i{font-style:normal;font:800 10px var(--mono);letter-spacing:.16em;color:#7fe9db;white-space:nowrap;border-right:1px solid rgba(255,255,255,.28);padding-right:14px}
    .insight b{font-size:16px;font-weight:850;letter-spacing:-.01em;line-height:1.32}
    /* 封面 / 封底 */
    .cover .content{padding-top:6px}
    .cover-top{display:flex;justify-content:space-between;align-items:center;font:11px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
    .cover-hero{margin-top:60px}
    .cover-kicker{font:800 13px var(--mono);letter-spacing:.34em;text-transform:uppercase;color:var(--blue);margin-bottom:22px}
    .cover-title{font-size:118px;line-height:.9;letter-spacing:-.06em;font-weight:950;color:var(--navy)}
    .cover-title em{font-style:normal;display:block;font:900 44px/1 var(--mono);letter-spacing:.02em;color:var(--teal);margin-top:14px}
    .cover-band{display:inline-flex;align-items:center;gap:10px;margin-top:30px;padding:10px 18px;border-radius:999px;background:var(--navy);color:#fff;font-size:19px;font-weight:850;letter-spacing:.02em;box-shadow:0 10px 26px rgba(11,42,74,.24)}
    .cover-band em{font-style:normal;color:var(--amber)}
    .cover-sub{margin-top:26px;font-size:18px;line-height:1.62;color:#33475b;font-weight:560;max-width:600px}
    .cover-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:34px}
    .cover-stat{border:1px solid var(--line);border-top:3px solid var(--blue);background:rgba(255,255,255,.9);border-radius:12px;padding:14px}
    .cover-stat b{display:block;font:900 30px/1 var(--mono);letter-spacing:-.04em;color:var(--navy)}
    .cover-stat span{display:block;margin-top:6px;font-size:12px;color:var(--muted);font-weight:600}
    .cover-stat:nth-child(2){border-top-color:var(--teal)}.cover-stat:nth-child(3){border-top-color:var(--amber)}.cover-stat:nth-child(4){border-top-color:var(--red)}
    .cover-foot{margin-top:auto;display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid var(--line);padding-top:16px}
    .cover-foot .meta{font:11px var(--mono);letter-spacing:.08em;color:var(--muted);line-height:1.7}
    .cover-qr{display:flex;align-items:center;gap:12px}.cover-qr img{width:82px;height:82px;background:#fff;padding:6px;border:1px solid var(--line);border-radius:10px}
    .cover-qr div{font-size:12px;color:#33475b;font-weight:700;line-height:1.5}
    .back-hero{margin-top:40px}
    .back-quote{font-size:52px;line-height:1.12;letter-spacing:-.05em;font-weight:950;color:var(--navy)}
    .back-quote em{font-style:normal;color:var(--red)}
    .back-sub{margin-top:22px;font-size:16px;line-height:1.66;color:#33475b;font-weight:560;max-width:600px}
    .back-index{margin-top:34px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.9);padding:18px 20px}
    .back-index h4{font:800 11px var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin:0 0 12px}
    .back-index ol{margin:0;padding:0;list-style:none;display:grid;grid-template-columns:repeat(2,1fr);gap:8px 26px}
    .back-index li{display:flex;gap:10px;align-items:baseline;font-size:13px;color:#28405a;border-bottom:1px dashed #e3e9ef;padding-bottom:7px}
    .back-index li b{font:800 12px var(--mono);color:var(--teal)}
    .back-foot{margin-top:auto;border-top:1px solid var(--line);padding-top:18px;display:flex;justify-content:space-between;align-items:flex-end}
    .back-foot .qr{gap:12px}.back-foot .qr img{width:78px;height:78px}
    .back-foot .sign{text-align:right}.back-foot .sign b{font-size:20px;color:var(--navy)}.back-foot .sign span{display:block;margin-top:6px;font:11px var(--mono);color:var(--muted);letter-spacing:.06em}
    @media print{ @page{size:A4 portrait;margin:0} body{padding:0;background:#fff}.pack{display:block;gap:0}.page{width:210mm;height:297mm;box-shadow:none} }
  </style>

<body>
<main class="pack" id="pack"></main>
<script>
const isPack = location.pathname.includes('yingyan-print-pack');
const brandBase = isPack ? 'assets/' : '../brand/';
const logo = brandBase + 'logo-mark.svg';
const qr = isPack ? 'assets/qr-yingyan.png' : 'qr-yingyan.png';
const iconBase = isPack ? 'assets/icons' : '../brand/icons';
const storySteps = ['总览','问题','结构','证据','飞检','监管','院端','插件','前中后','可信','体验'];

const pages = [
  {kind:'cover', body:'cover'},
  {n:1, story:1, title:['为什么需要','语义取证层'], kicker:'问题：不是没有规则，而是案卷太重', lead:'国家结算筛查已经覆盖海量流水，但一笔费用是否真的违规，仍要回到整本非结构化就诊材料里核对。', folio:'案卷太重，人扛不动 —— 让机器先读懂', body:'problem'},
  {n:2, story:1, title:['产品定位','站在规则之上'], kicker:'不替代国家系统，也不做自动处罚', lead:'鹰眼是监管稽核与院端合规共同使用的语义取证层，把官方规则落到具体费用行、病历原文与政策条款。', folio:'站在国家规则之上，不与国家系统争位', body:'position'},
  {n:3, story:2, title:['六层架构','确定性取证流水线'], kicker:'从材料摄取到文书输出，每层只做一件事', lead:'材料统一为案卷对象，再由规则路由、知识底座、可信门禁与导出层协同，得出可追溯的结论。', folio:'从材料到结论，每一步都可追溯', body:'architecture'},
  {n:4, story:3, title:['三要素','证据链'], kicker:'原文有位置 · 政策有出处 · 推理有链路', lead:'每一条对外疑点都必须同时具备原文定位、政策依据与完整推理；任一缺失即降级为线索或不予输出。', folio:'引不出原文的疑点，不输出', body:'evidence'},
  {n:5, story:2, title:['智能体设计','确定性 + 语义增强'], kicker:'默认可复现，需要时再增强', lead:'确定性规则引擎作为主干保证稳定与可回归，语义模型在争议判断上做申诉预演与取证自检。', folio:'读得更懂，但绝不报得更松', body:'agent'},

function header(p){return `<header><div class="brand"><img src="${logo}" alt=""><b>鹰眼 EAGLEEYE</b><em>WHITE PAPER</em></div><div>产品白皮书 · ${String(p.n).padStart(2,'0')} / 16</div></header>`}
function footer(p){return `<div class="footer"><div class="qr"><img src="${qr}" alt=""><span>扫码进入<br>在线 Demo 体验</span></div><span class="folio">${(p&&p.folio)||'引不出原文的疑点，不输出'}</span></div>`}
function title(p){return `<div class="eyebrow">${p.kicker}</div><h1>${p.title.map((x,i)=>i?`<span class="accent">${x}</span>`:x).join('<br>')}</h1><p class="lead">${p.lead}</p>`}
function storyRail(active){return `<div class="story-rail">${storySteps.map((s,i)=>`<span class="${i===active?'on':''}">${String(i+1).padStart(2,'0')} ${s}</span>`).join('')}</div>`}
function cards(items){return `<div class="grid2">${items.map(x=>`<div class="card ${x[2]||''}"><div class="label">${x[0]}</div><div class="desc">${x[1]}</div></div>`).join('')}</div>`}
function stats(items){return `<div class="grid4">${items.map(x=>`<div class="card"><div class="num">${x[0]}</div><div class="desc">${x[1]}</div></div>`).join('')}</div>`}
function bullets(items){return `<div class="bullets">${items.map(x=>`<div class="bullet"><i>▸</i><span>${x}</span></div>`).join('')}</div>`}

function body(name){
  const map={
    problem:`${stats([['8600','全国医保监管力量'],['13亿','参保人群'],['28.99万','定点机构'],['40min','单份材料人工初筛']])}<div class="rule"></div>${cards([['结构化筛查的边界','费用流水能发现异常，却难判断异常是否真的成立。','hot'],['非结构化的难点','病程、医嘱、检验、费用需要跨文档反复勾稽。','warn'],['人工翻阅的代价','逐页核对耗时，且口径与经验差异影响一致性。',''],['鹰眼补的环节','把存疑就诊读成可复核、可对质的证据链。','green']])}`,
    position:`<div class="matrix"><div></div><div class="cell head">事前</div><div class="cell head">事中</div><div class="cell head">事后</div><div class="cell head">医院侧</div><div class="cell"><b>开单提醒</b><p>规则提示与风险预筛。</p></div><div class="cell"><b>结算自查</b><p>提交前补材料、退回。</p></div><div class="cell"><b>整改复跑</b><p>飞检前留痕备查。</p></div><div class="cell head">监管侧</div><div class="cell"><b>风险画像</b><p>高危机构/科室提示。</p></div><div class="cell"><b>存疑复核</b><p>经办审核需核病历。</p></div><div class="cell"><b>飞检取证</b><p>事后核查与举证导出。</p></div></div><div class="rule"></div>${bullets(['不替代国家系统：全量结构化筛查仍由国家平台承担。','不做自动处罚：系统只给线索、证据与文书草稿，由人裁量。','不编造政策：每条规则必须绑定官方来源或标注待核验。'])}`,
    architecture:`<div class="arch-board"><div class="arch-stack">${[['第一层','材料摄取','接收 PDF、图片、表格与结构化数据，按病案、病程、医嘱、检验、病理、费用清单归类。'],['第二层','案卷对象','把每条费用、医嘱、诊断、检验统一结构化，并保留在原文中的位置与锚点。'],['第三层','知识底座','汇集官方政策、目录限制、临床条件与地方价目，作为判断依据。'],['第四层','规则判定','触发器先筛出相关规则，再交给对应检查逻辑执行，跳过无关规则。'],['第五层','可信门禁','证据、金额、覆盖、置信在此裁定，决定疑点、线索或不予输出。'],['第六层','文书输出','整理为核查清单、举证包、整改台账与溯源报告，进入现场工作流。']].map(x=>`<div class="arch-row"><b>${x[0]}</b><div><strong>${x[1]}</strong><span>${x[2]}</span></div></div>`).join('')}</div><div class="data-contract"><div class="contract"><b>统一案卷对象</b><div class="flowline"><span>费用、医嘱、诊断、检验、病理统一入库</span><span>每条事实保留来源文档、行号与原文锚点</span><span>识别置信度继续传递到最终结论</span></div></div><div class="contract"><b>结论输出契约</b><div class="flowline"><span>状态：疑点 / 线索 / 正确不报</span><span>证据：原文定位 + 政策条款 + 推理过程</span><span>交付：核查清单、举证包、整改台账</span></div></div><div class="callout"><b>核心原则</b><p>事实层与判定层分离，语义模型只增强理解，不能绕过三要素门禁。</p></div></div></div>`,
    evidence:`<div class="grid3"><div class="card hot"><div class="label">① 原文定位</div><div class="desc">精确到费用清单第几行、病历哪一段、病理哪一份，点击回到原件。</div></div><div class="card warn"><div class="label">② 政策依据</div><div class="desc">引用官方文号、条款原文、核验状态与生效日期，不由模型代笔。</div></div><div class="card green"><div class="label">③ 完整推理</div><div class="desc">触发条件、需核事实、除外情形与结论逐步串联，便于复核。</div></div></div><div class="rule"></div>${miniUi('audit')}`,
    agent:`<div class="swimlane"><div class="lane role">材料</div><div class="lane"><b>费用清单</b><p>金额、数量、日期、类别。</p></div><div class="lane"><b>医嘱 / 病程</b><p>用药依据、周期、禁忌。</p></div><div class="lane"><b>检验 / 病理</b><p>阈值、分子检测、诊断。</p></div><div class="lane"><b>政策底座</b><p>条款、目录、生效日。</p></div><div class="lane role">智能体</div><div class="lane"><b>稽核角色</b><p>提出候选疑点与证据。</p></div><div class="lane"><b>取证自检</b><p>逐条核对证据闭环。</p></div><div class="lane"><b>申辩角色</b><p>模拟医院补材料理由。</p></div><div class="lane"><b>裁判角色</b><p>维持、降级或补材料。</p></div></div><div class="flow-card"><b>工作顺序</b><span>确定性规则先产生候选疑点，保证稳定与可回归。</span><span>语义角色再阅读自由文本，补充病程、医嘱与检验中的上下文。</span><span>申诉预演最后裁定：维持疑点、降级线索，或要求补材料。</span></div>`,
    rules:`${stats([['全库','对齐国家两库框架'],['全域','覆盖医保规则体系'],['13+','重点专科场景'],['可溯源','规则绑定官方来源']])}<div class="rule"></div><div class="grid2"><div>${bullets(['政策库按法规、清单、规则、目录、案例分层，保留来源与生效日。','围绕肿瘤、影像、重症、麻醉、骨科、检验、药店等专科建检查逻辑。','待核验内容明确标注，不把未核验条款包装成事实。','地方适配层接入省级价目、DRG/DIP、护理收费与目录限定。'])}</div><div class="mini-ledger"><div class="ledger-item"><b>T-201</b><span>靶向药缺分子病理证据</span><i>肿瘤</i></div><div class="ledger-item"><b>B-201</b><span>超目录限定支付范围</span><i>目录</i></div><div class="ledger-item"><b>A-109</b><span>结算数量超医嘱记录</span><i>通用</i></div><div class="ledger-item"><b>ICU-302</b><span>设备计费时长与记录不符</span><i>重症</i></div></div></div>`,
    'audit-ui':`${miniUi('audit')}<div class="rule"></div>${cards([['左侧 · 材料区','以文档标签组织病案、病程、医嘱、检验、病理与费用清单。'],['中间 · 报告区','总览、疑点、正确不报、覆盖度分页；疑点可展开三要素。'],['右侧 · 操作区','源文档跳转、正确不报解释、核查清单与举证包导出。'],['同屏协作','围绕疑点逐条核证据，减少多系统之间的来回切换。']])}`,
    'hospital-ui':`${miniUi('hospital')}<div class="rule"></div>${cards([['优先队列','按风险分、科室、金额与状态排序，先处理高价值就诊。'],['自查输出','风险点、线索、正确不报，均以整改口径表达。'],['整改台账','补材料、主动退回、责任科室与复跑状态形成闭环。'],['价值前移','把可整改的问题在飞检之前处理干净。']])}`,
    plugin:`${cards([['浏览器扩展','Chrome MV3 · 本地引擎 :3700 · 演示靶站 mockhis.html 即装即演。','green'],['三角色触点','医生开单 · 编码员 DRG · 结算员上传——同一浮层与处置范式。','hot'],['事前规则子集','AGE-101 年龄分层 · F-001 性别冲突 · T-201 靶向缺检测 · B-201 超限定支付。','warn'],['院端↔监管闭环','采纳整改 / 坚持提交+理由 → 台账 → 未遵从进 priority · 监管回执。','']])}<div class="rule"></div>${bullets(['政策出处：两库可置于机构智能提醒，"将不合规行为消除在萌芽阶段"。','不触碰医保部门统一 APP 边界：医院自装自用，医生保留最终决定权。','内嵌演示通道：未装扩展时 MockHIS「鹰眼审方(内嵌)」等价走同一 API。','运营看板 plugin-dashboard.html：遵从率、萌芽拦截、未遵从待监管一览。'])}`,

function articleFor(name){const arr=articles[name];return arr?`<div class="article">${arr.map(p=>`<p>${p}</p>`).join('')}</div>`:''}
function highlights(items){return `<div class="hl-row">${items.map(x=>`<div class="hl"><img src="${iconBase}/${x[0]}.svg" alt=""><b>${x[1]}</b><span>${x[2]}</span></div>`).join('')}</div>`}
function meter(items){return `<div class="meter">${items.map(x=>`<div class="mrow"><span>${x[0]}</span><span class="bar"><i style="width:${x[2]}"></i></span><b>${x[1]}</b></div>`).join('')}</div>`}
function insight(label,text){return `<div class="insight"><i>${label}</i><b>${text}</b></div>`}
const extras={
  problem:`${meter([['人工初筛','约 40 分钟','100%'],['鹰眼初筛','约 90 秒','5%']])}${insight('CORE','把"看不完的案卷"，先变成"看得清的证据"。')}`,
  position:`${highlights([['ok','不替代','国家全量结构化筛查仍由国家平台承担'],['doubt','不处罚','只给线索与证据，定性由人裁量'],['policy','不造规则','条款绑定官方来源，未核验即标注'],['evidence','只落案卷','判断锚定费用行与病历原文']])}${insight('BOUNDARY','站在国家规则之上，不与国家系统争位。')}`,
  rules:`${highlights([['policy','法规·清单','官方文件与目录分层入库'],['rules','规则','绑定条款与生效日期'],['report','案例','沉淀可复用的判例'],['evidence','可溯源','每条疑点回链官方原文']])}${insight('FOUNDATION','不造规则、不编条款，只把官方规则落到案卷。')}`,
  agent:`${highlights([['audit','稽核角色','提出候选疑点与证据'],['ok','取证自检','逐条核对证据是否闭环'],['clue','申辩角色','模拟医院补材料与申辩'],['doubt','裁判角色','维持、降级或要求补材料']])}${insight('DISCIPLINE','让系统读得更懂，但绝不报得更松。')}`,
  stages:`${highlights([['policy','事前 · 插件','浏览器扩展开单审方'],['clue','事中 · 医院','结算提交前一致性自查'],['audit','事后 · 监管','飞检与专项稽核取证'],['evidence','同一证据链','三入口共用规则与 KB']])}${insight('CLOSED-LOOP','医院前移发现，监管事后兜底。')}`,

  trust:`${highlights([['report','合议去重','同一笔费用金额只计一次'],['ok','覆盖声明','查了什么、没查什么可审计'],['doubt','置信传播','低置信与缺材料自动降级'],['rules','输入隔离','判定不被病历文本操纵']])}${insight('VERIFIABLE','可信不是承诺，而是可检验的工程约束。')}`,

function renderPage(p){

  if(p.body==='backcover') return renderBack();

}
document.getElementById('pack').innerHTML = pages.map(renderPage).join('');
