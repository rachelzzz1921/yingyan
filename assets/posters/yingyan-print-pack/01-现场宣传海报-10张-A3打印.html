<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鹰眼 EAGLEEYE · 现场宣传海报 10 张</title>
  <style>
    :root{
      --ink:#07111f;--navy:#0b2a4a;--blue:#002fa7;--teal:#2dd4bf;--amber:#e8a838;--red:#dc4a3d;--green:#0d9b6a;
      --c1:#002fa7;--c2:#0d8b7e;--c3:#c77700;--c4:#dc4a3d;--c5:#0d9b6a;
      --paper:#f7f8f6;--muted:#65758a;--line:#d8dee5;--dark:#0d1117;
      --sans:"Inter","Helvetica Neue","PingFang SC","Noto Sans SC","Microsoft YaHei",Arial,sans-serif;
      --mono:"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
    }
    *{box-sizing:border-box}
    body{margin:0;padding:28px;background:#e5e7eb;color:var(--ink);font-family:var(--sans)}
    #book{display:grid;gap:28px;justify-items:center}
    .poster{
      --accent:var(--blue);
      --wash-a:rgba(0,47,167,.09);--wash-b:rgba(45,212,191,.11);--wash-c:rgba(232,168,56,.07);
      --orb-a:rgba(0,47,167,.20);--orb-b:rgba(45,212,191,.20);--orb-c:rgba(232,168,56,.14);
      position:relative;width:1080px;height:1528px;overflow:hidden;color:var(--ink);
      background:
        radial-gradient(78% 58% at 92% -2%,var(--wash-a),transparent 72%),
        radial-gradient(70% 56% at 2% 102%,var(--wash-b),transparent 74%),
        radial-gradient(56% 44% at 50% -12%,var(--wash-c),transparent 74%),
        #ffffff;
      box-shadow:0 22px 60px rgba(15,23,42,.16);padding:44px 54px 38px;page-break-after:always;
    }
    /* 细网点底纹 */
    .poster:before{content:"";position:absolute;inset:0;z-index:0;background-image:radial-gradient(currentColor .7px,transparent .7px);background-size:22px 22px;opacity:.04;pointer-events:none}
    /* 右上角羽化柔光球（大面积模糊，边缘融进白底） */
    .poster:after{content:"";position:absolute;z-index:0;pointer-events:none;top:-340px;right:-300px;width:820px;height:820px;border-radius:50%;background:radial-gradient(circle at 50% 50%,var(--orb-a) 0%,transparent 62%);filter:blur(60px);opacity:.95}
    /* 左下角 + 中部两枚柔光球，层层叠晕 */
    .poster .halo{position:absolute;z-index:0;pointer-events:none;left:-260px;bottom:-280px;width:720px;height:720px;border-radius:50%;background:radial-gradient(circle at 50% 50%,var(--orb-b) 0%,transparent 60%);filter:blur(72px)}
    .poster .halo:after{content:"";position:absolute;right:-520px;top:-40px;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle at 50% 50%,var(--orb-c) 0%,transparent 64%);filter:blur(64px);opacity:.85}
    .poster.tone-indigo{--accent:#002fa7;--wash-a:rgba(0,47,167,.10);--wash-b:rgba(45,212,191,.11);--wash-c:rgba(20,120,190,.08);--orb-a:rgba(0,47,167,.24);--orb-b:rgba(45,212,191,.22);--orb-c:rgba(20,120,190,.16)}
    .poster.tone-graphite{--accent:#0d8b7e;--wash-a:rgba(220,74,61,.08);--wash-b:rgba(45,212,191,.11);--wash-c:rgba(11,42,74,.06);--orb-a:rgba(45,212,191,.24);--orb-b:rgba(220,74,61,.18);--orb-c:rgba(13,139,126,.18)}
    .poster.tone-mist{--accent:#002fa7;--wash-a:rgba(0,47,167,.08);--wash-b:rgba(232,168,56,.10);--wash-c:rgba(45,212,191,.08);--orb-a:rgba(0,47,167,.18);--orb-b:rgba(232,168,56,.22);--orb-c:rgba(45,212,191,.16)}
    /* 左侧品牌渐变色脊 */
    .poster .spine{position:absolute;left:0;top:0;bottom:0;width:9px;z-index:2;background:linear-gradient(180deg,var(--c1),var(--c2) 42%,var(--c3) 72%,var(--c4));opacity:.95}
    /* 每页柔光球调色板按页序轮换，避免 10 页雷同 */
    .poster:nth-child(1){--orb-a:rgba(0,47,167,.22);--orb-b:rgba(45,212,191,.22);--orb-c:rgba(232,168,56,.14)}
    .poster:nth-child(2){--orb-a:rgba(232,168,56,.20);--orb-b:rgba(0,47,167,.18);--orb-c:rgba(45,212,191,.16)}
    .poster:nth-child(3){--orb-a:rgba(45,212,191,.24);--orb-b:rgba(220,74,61,.16);--orb-c:rgba(11,42,74,.10)}
    .poster:nth-child(4){--orb-a:rgba(13,155,106,.20);--orb-b:rgba(0,47,167,.18);--orb-c:rgba(45,212,191,.16)}
    .poster:nth-child(5){--orb-a:rgba(220,74,61,.18);--orb-b:rgba(45,212,191,.20);--orb-c:rgba(232,168,56,.14)}
    .poster:nth-child(6){--orb-a:rgba(0,47,167,.20);--orb-b:rgba(232,168,56,.20);--orb-c:rgba(13,155,106,.16)}
    .poster:nth-child(7){--orb-a:rgba(45,212,191,.22);--orb-b:rgba(13,155,106,.18);--orb-c:rgba(0,47,167,.14)}
    .poster:nth-child(8){--orb-a:rgba(232,168,56,.20);--orb-b:rgba(220,74,61,.16);--orb-c:rgba(45,212,191,.16)}
    .poster:nth-child(9){--orb-a:rgba(0,47,167,.20);--orb-b:rgba(45,212,191,.20);--orb-c:rgba(220,74,61,.14)}
    .poster:nth-child(10){--orb-a:rgba(0,47,167,.22);--orb-b:rgba(45,212,191,.22);--orb-c:rgba(232,168,56,.16)}
    .content{position:relative;z-index:1;height:100%;display:flex;flex-direction:column}
    header{display:flex;justify-content:space-between;gap:24px;margin-bottom:14px;font:14px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
    .dark header,.blue header{color:rgba(255,255,255,.66)}
    .brand{display:flex;align-items:center;gap:12px;font-family:var(--sans);letter-spacing:0;text-transform:none;color:inherit}
    .brand img{width:48px;height:48px}.brand b{font-size:25px}
    .storyline{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin:0 0 18px;color:var(--muted)}
    .story-step{border-top:3px solid currentColor;padding-top:6px;font:700 10px/1.2 var(--mono);letter-spacing:.06em;text-transform:uppercase;opacity:.34;min-width:0}
    .story-step.on{color:var(--accent);opacity:1}
    .dark .storyline,.blue .storyline{color:rgba(255,255,255,.45)}
    .eyebrow{font:700 16px var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
    .dark .eyebrow,.blue .eyebrow{color:var(--teal)}
    h1,h2,h3,p{margin:0}
    h1{font-size:78px;line-height:1.01;letter-spacing:-.05em;font-weight:850}
    h1.lg{font-size:84px;line-height:.98}
    h1.sm{font-size:66px;line-height:1.03}
    .sublead{margin-top:10px;font-size:20px;line-height:1.36;color:var(--muted);font-weight:600}
    .dark .sublead,.blue .sublead{color:rgba(255,255,255,.68)}
    .lead{margin-top:13px;font-size:22px;line-height:1.46;color:#344256;font-weight:530}
    .dark .lead,.blue .lead{color:rgba(255,255,255,.82)}
    .accent{color:var(--accent)}.red{color:var(--red)}.teal{color:var(--teal)}.amber{color:var(--amber)}
    .rule{height:2px;background:currentColor;opacity:.15;margin:14px 0}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .card{--cc:var(--accent);background:#fff;border:1px solid var(--line);border-top:3px solid var(--cc);border-radius:13px;padding:13px 14px;min-height:104px;box-shadow:0 3px 14px rgba(11,42,74,.06)}
    .dark .card,.blue .card{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.18)}
    .card.hot{background:var(--blue);color:#fff;border-color:var(--blue)}
    .card.tealhot{background:#073d3b;color:#fff;border-color:#105d58}
    .card.redhot{background:#351219;color:#fff;border-color:#61222b}
    .num{font:850 46px/1 var(--mono);letter-spacing:-.06em;color:var(--cc);margin-bottom:6px}
    /* 卡片多彩强调色轮换：蓝/青/琥珀/红/绿 */
    .grid4>*:nth-child(5n+1),.pipeline>*:nth-child(5n+1),.detail-grid>*:nth-child(5n+1),.phase-strip>*:nth-child(5n+1),.mini-ledger>*:nth-child(5n+1){--cc:var(--c1)}
    .grid4>*:nth-child(5n+2),.pipeline>*:nth-child(5n+2),.detail-grid>*:nth-child(5n+2),.phase-strip>*:nth-child(5n+2),.mini-ledger>*:nth-child(5n+2){--cc:var(--c2)}
    .grid4>*:nth-child(5n+3),.pipeline>*:nth-child(5n+3),.detail-grid>*:nth-child(5n+3),.phase-strip>*:nth-child(5n+3),.mini-ledger>*:nth-child(5n+3){--cc:var(--c3)}
    .grid4>*:nth-child(5n+4),.pipeline>*:nth-child(5n+4),.detail-grid>*:nth-child(5n+4),.phase-strip>*:nth-child(5n+4),.mini-ledger>*:nth-child(5n+4){--cc:var(--c4)}
    .grid4>*:nth-child(5n),.pipeline>*:nth-child(5n),.detail-grid>*:nth-child(5n),.phase-strip>*:nth-child(5n),.mini-ledger>*:nth-child(5n){--cc:var(--c5)}
    /* 统计卡：上下左右居中，突出大数字 */
    .card:has(.num){display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
    .dark .num,.blue .num{color:var(--teal)}
    .label{font-size:19px;font-weight:830;margin-bottom:5px;line-height:1.22}
    .desc{font-size:15.5px;line-height:1.44;color:var(--muted);font-weight:540}
    .dark .desc,.blue .desc{color:rgba(255,255,255,.65)}
    .tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
    .tag{border:1px solid currentColor;padding:7px 10px;font:13px var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--accent);background:rgba(255,255,255,.55)}
    .dark .tag,.blue .tag{color:var(--teal);background:rgba(255,255,255,.06)}
    .bottom{margin-top:auto;display:flex;justify-content:space-between;align-items:flex-end;gap:20px;border-top:1px solid rgba(127,127,127,.28);padding-top:12px;font:12.5px var(--mono);letter-spacing:.08em;color:var(--muted)}
    .dark .bottom,.blue .bottom{color:rgba(255,255,255,.62);border-color:rgba(255,255,255,.18)}
    .bottom .slogan{text-align:right;font-weight:800;max-width:52%;line-height:1.38;letter-spacing:.02em;font-family:var(--sans);font-size:13.5px;text-transform:none;color:var(--navy)}
    .quote{font-size:36px;line-height:1.16;letter-spacing:-.035em;font-weight:850;padding:18px;border-left:8px solid var(--blue);background:rgba(0,47,167,.06)}
    .dark .quote{border-color:var(--red);background:rgba(220,74,61,.08)}
    .pipeline{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:14px}
    .step{--cc:var(--accent);min-height:118px;border:1px solid var(--line);border-top:3px solid var(--cc);border-radius:12px;background:#fff;padding:11px 10px;box-shadow:0 3px 12px rgba(11,42,74,.05)}
    .dark .step{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.16)}
    .step b{display:block;font:820 22px var(--mono);color:var(--cc);margin-bottom:8px}
    .dark .step b{color:var(--teal)}
    .step span{display:block;font-size:15.5px;line-height:1.3;font-weight:790}
    .step small{display:block;margin-top:6px;font-size:13.5px;line-height:1.34;color:var(--muted)}
    .dark .step small{color:rgba(255,255,255,.58)}
    .matrix{display:grid;grid-template-columns:124px repeat(3,1fr);gap:8px;margin-top:14px}
    .cell{min-height:112px;border:1px solid var(--line);border-radius:11px;padding:12px 13px;background:#fff;display:flex;flex-direction:column;justify-content:center}
    .cell.head{display:grid;place-items:center;background:var(--navy);color:#fff;text-align:center;font-size:19px;font-weight:850;padding:10px}
    .cell.hot{background:var(--blue);color:#fff;border-color:var(--blue)}
    .cell.soft{background:#e8f7f5}.cell b{font-size:18.5px;display:block;line-height:1.22}
    .cell p{font-size:14.5px;line-height:1.4;margin-top:6px;color:inherit;opacity:.86}
    .screen{background:#0d1117;border:1px solid #253141;padding:12px;box-shadow:0 18px 40px rgba(7,17,31,.2)}
    .screen img{display:block;width:100%;border:1px solid #2b3849}
    .caption{margin-top:10px;font-size:14px;line-height:1.4;color:var(--muted)}
    .product-showcase{background:#eef2f7;border:1px solid #d8dee5;box-shadow:0 18px 40px rgba(7,17,31,.22);color:#0b2a4a;font-size:11.6px;line-height:1.38;overflow:hidden}
    .product-showcase .ui-topbar{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;background:linear-gradient(125deg,#061829 0%,#0b2a4a 48%,#134e72 100%);border-bottom:2px solid rgba(232,168,56,.42);font:10px var(--mono);letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.82)}
    .product-showcase .ui-brand{display:flex;align-items:center;gap:9px;font-family:var(--sans);letter-spacing:0;text-transform:none;font-weight:800;font-size:13px;color:#fff}
    .product-showcase .ui-brand img{width:30px;height:30px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.26);background:#fff}
    .product-showcase .ui-actions{display:flex;gap:6px;align-items:center}.product-showcase .ui-actions span{border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.18);border-radius:8px;padding:4px 7px}
    .product-showcase .ui-wf{display:flex;justify-content:center;gap:6px;padding:8px 10px;background:#fff;border-bottom:1px solid #d8dee5;flex-wrap:wrap}
    .product-showcase .ui-wf span{display:flex;align-items:center;gap:5px;padding:5px 9px;border:1px solid #d8dee5;border-radius:9px;background:#fafcfe;font-size:10px;font-weight:700;color:#65758a}
    .product-showcase .ui-wf span.on{border-color:rgba(45,212,191,.5);background:#ecfdf5;color:#0b2a4a;box-shadow:0 2px 8px rgba(45,212,191,.12)}
    .product-showcase .ui-casebar{display:flex;justify-content:space-between;gap:8px;align-items:center;padding:7px 12px;background:linear-gradient(90deg,#f8fafc,#fff);border-bottom:1px solid #d8dee5;color:#33475b;font-size:10px}
    .product-showcase .ui-casebar b{color:#0b2a4a}.product-showcase .case-tag{font:800 9px var(--mono);padding:2px 7px;border-radius:6px;background:#fef0ee;color:#dc4a3d}
    .product-showcase .ui-body{display:grid;grid-template-columns:minmax(220px,.88fr) minmax(330px,1.18fr);gap:10px;padding:10px;min-height:330px}
    .product-showcase.hospital .ui-body{display:block;min-height:280px}
    .product-showcase .ui-pane{background:#fff;border:1px solid #d8dee5;border-radius:12px;box-shadow:0 2px 8px rgba(11,42,74,.06);overflow:hidden;min-height:0}
    .product-showcase .ui-panel-head{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:linear-gradient(180deg,#fafcfe,#f5f8fc);border-bottom:1px solid #d8dee5;font-weight:800;font-size:11px;color:#0b2a4a}
    .product-showcase .ui-doc-tabs{display:flex;gap:4px;flex-wrap:wrap;padding:7px;background:#fbfcfe;border-bottom:1px solid #d8dee5}
    .product-showcase .ui-doc-tabs span{padding:4px 7px;border:1px solid #d8dee5;border-radius:7px;background:#fff;font-size:9.5px;color:#33475b}.product-showcase .ui-doc-tabs span.on{background:#134e72;color:#fff;border-color:#134e72}
    .product-showcase .ui-doc{padding:9px 10px;color:#33475b}.product-showcase .ui-doc h4{font-size:10.5px;color:#134e72;border-bottom:1px solid #d8dee5;margin:7px 0 5px;padding-bottom:3px}.product-showcase .ui-line{padding:4px 0;border-bottom:1px dashed #e8edf3}.product-showcase .ui-highlight{background:#fff8e8;border-left:3px solid #e8a838;padding:5px 7px;border-radius:0 6px 6px 0;color:#7a4d00;margin-top:6px}
    .product-showcase .ui-report{padding:9px 10px}.product-showcase .ui-tabs{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
    .product-showcase .ui-tabs span{padding:4px 8px;border:1px solid #d8dee5;border-radius:8px;background:#fff;font-size:10px;color:#65758a}.product-showcase .ui-tabs span.on{background:#0b2a4a;color:#fff;border-color:#0b2a4a}
    .product-showcase .ui-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
    .product-showcase .ui-kpi .k{display:flex;align-items:flex-start;gap:6px;background:#fbfcfe;border:1px solid #d8dee5;border-radius:9px;padding:7px 5px}
    .product-showcase .ui-icon{width:17px;height:17px;flex:0 0 auto;opacity:.95}.product-showcase .ui-kpi .k b{display:block;font:850 19px/1 var(--mono);letter-spacing:-.04em}.product-showcase .ui-kpi .k span{display:block;font-size:10.2px;color:#65758a;margin-top:2px}.product-showcase .ui-kpi .k.red b{color:#dc4a3d}.product-showcase .ui-kpi .k.amber b{color:#c77700}.product-showcase .ui-kpi .k.teal b{color:#0d9b6a}.product-showcase .ui-kpi .k.blue b{color:#134e72}
    .product-showcase .ui-finding{background:#fff;border:1px solid #d8dee5;border-left:4px solid #dc4a3d;border-radius:10px;margin-bottom:7px;overflow:hidden}
    .product-showcase .ui-finding.clue{border-left-color:#c77700}.product-showcase .ui-finding.ok{border-left-color:#0d9b6a;background:#f8fffb}
    .product-showcase .ui-finding b{display:block;font-size:12.8px;color:#0b2a4a}.product-showcase .ui-finding .meta{font-size:10.4px;color:#65758a;margin-top:2px}
    .product-showcase .ui-fhead{display:flex;gap:6px;align-items:center;padding:7px 8px;border-bottom:1px solid #eef2f6}.product-showcase .badge{font:800 9.8px var(--sans);border-radius:999px;padding:2px 7px;background:#fef0ee;color:#dc4a3d;white-space:nowrap}.product-showcase .badge.clue{background:#fff6e6;color:#c77700}.product-showcase .badge.ok{background:#e8f7f0;color:#0d9b6a}
    .product-showcase .ui-ec{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;padding:7px;background:#fbfcfe}.product-showcase .ui-ev{background:#fff;border:1px solid #d8dee5;border-radius:7px;padding:6px;font-size:10.4px;color:#33475b}.product-showcase .ui-ev i{display:flex;align-items:center;gap:4px;font-style:normal;color:#134e72;font:800 9.6px var(--mono);letter-spacing:.04em;margin-bottom:2px}.product-showcase .ui-ev i img{width:12px;height:12px}
    .product-showcase .ui-mini{display:grid;grid-template-columns:1fr 1fr;gap:5px}.product-showcase .ui-mini .ui-finding{margin:0}.product-showcase .ui-mini .ui-fhead{padding:6px}.product-showcase .ui-mini .ui-finding b{font-size:11.2px}
    .product-showcase .ui-queue{width:100%;border-collapse:collapse;font-size:11.3px;background:#fff}.product-showcase .ui-queue th,.product-showcase .ui-queue td{border-bottom:1px solid #d8dee5;padding:7px 6px;text-align:left;color:#33475b}.product-showcase .ui-queue th{background:#f8fafc;color:#65758a;font:800 9.6px var(--mono);letter-spacing:.06em;text-transform:uppercase}.product-showcase .ui-queue tr:hover td,.product-showcase .ui-queue tr.hot td{background:#f0fdfa}.product-showcase .ui-queue .rank{font:850 12px var(--mono);color:#14b8a6;width:28px;text-align:center}.product-showcase .ui-queue .score{font:850 13px var(--mono);color:#134e72;white-space:nowrap}.product-showcase .ui-queue .tier{display:inline-block;padding:1px 7px;border-radius:999px;background:#fef0ee;border:1px solid #fecaca;color:#dc4a3d;font-size:9px;font-weight:800}
    .product-showcase .showcase-foot{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 10px;background:#fff;border-top:1px solid #d8dee5}.product-showcase .showcase-foot span{font-size:10px;color:#65758a;text-align:center}.product-showcase .showcase-foot b{display:block;color:#0b2a4a;font-size:11px;margin-bottom:2px}
    .product-showcase.audit .ui-body{grid-template-columns:210px 1fr 188px;min-height:370px}
    .product-showcase.hospital .ui-body{display:grid;grid-template-columns:1.24fr .76fr;gap:10px;min-height:360px}
    .product-showcase .ui-toolbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:7px 10px;background:#fbfcfe;border-bottom:1px solid #d8dee5;font-size:9.5px;color:#65758a}

function lines(text){
  if(text == null || text === '') return '';
  if(Array.isArray(text)) return text.join('<br>');
  return String(text).split('\n').join('<br>');
}
function titleHtml(linesArr, cls=''){
  const tag = cls ? ` class="${cls}"` : '';
  return `<h1${tag}>${linesArr.map((l,i)=> i===0?l:`<span class="accent">${l}</span>`).join('<br>')}</h1>`;
}
function header(i,p){
  return `<header><div class="brand"><img src="${logo}" alt=""><b>鹰眼 EAGLEEYE</b></div><div>${String(i+1).padStart(2,'0')} / 10 · ${p.kicker || p.section}</div></header>`;
}
function storyline(active){
  return `<div class="storyline">${storySteps.map((s,i)=>`<div class="story-step ${i===active?'on':''}">${String(i+1).padStart(2,'0')}<br>${s}</div>`).join('')}</div>`;
}
function footer(p){
  const qrBlock = p.qr ? `<div class="qr"><img src="${qr}" alt=""><img src="${expQr}" alt=""><span>扫码体验<br>在线 Demo</span></div>` : `<span>MEDICAL INSURANCE AUDIT · AI AGENT</span>`;

}
function statGrid(stats){ return `<div class="grid4">${stats.map(s=>`<div class="card"><div class="num">${s[0]}</div><div class="desc">${lines(s[1])}</div></div>`).join('')}</div>`; }
function cards(items){
  const rows = items.length <= 4 ? [items] : [items.slice(0,4), items.slice(4)];
  return rows.map(row=>`<div class="grid4">${row.map((c,i)=>`<div class="card ${i===0&&!rows[1]?'hot':''}"><div class="label">${lines(c[0])}</div><div class="desc">${lines(c[1])}</div></div>`).join('')}</div>`).join('');
}

function phaseStrip(items){ return `<div class="phase-strip">${items.map(r=>`<div class="phase"><b>${lines(r[0])}</b><span>${lines(r[1])}</span></div>`).join('')}</div>`; }
function detailGrid(items){ return `<div class="detail-grid">${items.map(r=>`<div class="detail"><b>${lines(r[0])}</b><span>${lines(r[1])}</span></div>`).join('')}</div>`; }

          <div class="ui-drawer-card"><b>导出动作</b><div class="ui-action-row"><span class="ui-btn primary">核查清单</span><span class="ui-btn">举证包</span><span class="ui-btn">CSV</span></div></div>
        </div>
      </div>
    </div>
    <div class="showcase-foot">
      <span><b>材料联动</b>点击疑点跳原文</span>
      <span><b>证据链</b>定位 + 条款 + 推理</span>
      <span><b>误报控制</b>正确不报可解释</span>
      <span><b>导出</b>核查清单与举证包</span>
    </div>
  </div>
  <div class="showcase-caption">监管侧界面：像飞检现场正在核查一样，材料、疑点、证据操作同时在屏</div>`;
}
function steps(items){ return `<div class="pipeline" style="grid-template-columns:repeat(5,1fr)">${items.map(s=>`<div class="step"><b>${s[0]}</b><span>${lines(s[1])}</span><small>${lines(s[2])}</small></div>`).join('')}</div>`; }
function tags(items){ return `<div class="tags">${items.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`; }
function takeaway(text){ return `<div class="takeaway">${lines(text)}</div>`; }

function renderPoster(p,i){
  let body = `<div class="eyebrow">${p.section}</div>${titleHtml(p.title, p.titleClass||'')}`;
  if(p.sublead) body += `<p class="sublead">${lines(p.sublead)}</p>`;
  body += `<p class="lead">${lines(p.lead)}</p>`;
  if(p.quote){ body += `<div class="rule"></div><div class="quote">${lines(p.quote)}</div>`; }
  if(p.stats){ body += `<div class="rule"></div>${statGrid(p.stats)}`; }
  if(p.pipeline){ body += `<div class="section-title">PIPELINE</div>${pipeline(p.pipeline)}`; }
  if(p.phase){ body += `<div class="section-title">WORKFLOW</div>${phaseStrip(p.phase)}`; }
  if(p.cards){ body += `<div class="rule"></div><div class="section-title">CAPABILITIES</div>${cards(p.cards)}`; }
  if(p.ledger){ body += `<div class="section-title">OUTPUT STATES</div>${ledger(p.ledger)}`; }
  if(p.matrix){ body += `<div class="section-title">COVERAGE</div>${matrix()}`; }
  if(p.showcase){ body += `<div class="rule"></div>${productShowcase(p.showcase)}`; }
  if(p.steps){ body += `<div class="section-title">QUICK START</div>${steps(p.steps)}`; }
  if(p.bullets){ body += `<div class="rule"></div>${bullets(p.bullets)}`; }
  if(p.mini){ body += miniLedger(p.mini); }
  if(p.details){ body += detailGrid(p.details); }
  if(p.takeaway){ body += takeaway(p.takeaway); }
  if(p.tags) body += tags(p.tags);
  const toneMap = { blue:'tone-indigo', dark:'tone-graphite', light:'tone-mist' };
  const cls = [toneMap[p.theme] || 'tone-mist', p.density||''].filter(Boolean).join(' ');
  return `<section class="poster ${cls}"><div class="spine"></div><div class="halo"></div><div class="content">${header(i,p)}${storyline(i)}${body}${footer(p)}</div></section>`;
}

document.getElementById('book').innerHTML = posters.map(renderPoster).join('');
</script>
</body>
</html>
