    <g transform="translate(0 0)">
      <rect x="0" y="0" width="128" height="128" rx="8" fill="url(#logo-bg)"/>
      <circle cx="64" cy="64" r="52" stroke="#E8A838" stroke-width="3.2" stroke-opacity="0.58"/>
      <path d="M64 20 A44 44 0 0 1 108 64" stroke="#E8A838" stroke-width="7" stroke-linecap="round"/>
      <path d="M24 64 C34 40 94 40 104 64 C94 88 34 88 24 64 Z" stroke="#FFFFFF" stroke-width="5" stroke-linejoin="round" opacity="0.94"/>
      <circle cx="64" cy="64" r="22" fill="#2DD4BF"/>
      <circle cx="64" cy="64" r="10" fill="#061829"/>
      <circle cx="70" cy="58" r="4" fill="#FFFFFF" opacity="0.95"/>
      <line x1="64" y1="12" x2="64" y2="27" stroke="#E8A838" stroke-width="4" stroke-linecap="round" opacity="0.68"/>
      <line x1="64" y1="101" x2="64" y2="116" stroke="#E8A838" stroke-width="4" stroke-linecap="round" opacity="0.42"/>
      <line x1="12" y1="64" x2="27" y2="64" stroke="#E8A838" stroke-width="4" stroke-linecap="round" opacity="0.42"/>
      <line x1="101" y1="64" x2="116" y2="64" stroke="#E8A838" stroke-width="4" stroke-linecap="round" opacity="0.42"/>
    </g>
    <text x="164" y="52" class="ink" font-size="48" font-weight="700">鹰眼</text>
    <text x="164" y="112" class="blue latin" font-size="64" font-weight="800">EAGLEEYE</text>
    <text x="164" y="166" class="muted" font-size="34" font-weight="500">医保基金稽核智能体</text>
    <text x="2040" y="42" class="muted latin" font-size="26" font-weight="600" text-anchor="end">MEDICAL INSURANCE AUDIT AI AGENT</text>
    <text x="2040" y="86" class="blue mono" font-size="28" font-weight="700" text-anchor="end">Hackathon S4</text>
    <line x1="0" y1="294" x2="2040" y2="294" class="rule"/>
  </g>

  <!-- Headline -->
