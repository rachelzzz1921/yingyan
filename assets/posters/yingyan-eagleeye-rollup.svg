    <text x="0" y="0" class="blue mono" font-size="34" font-weight="700">01 / EVIDENCE CHAIN</text>
    <text x="0" y="154" class="blue" font-size="142" font-weight="800">90秒，输出一份</text>
    <text x="0" y="332" class="blue" font-size="142" font-weight="800">能拿去对质的证据链</text>
    <text x="0" y="430" class="muted" font-size="42" font-weight="500">读懂病历、医嘱、费用清单，疑点必须回链原文与政策条款。</text>
    <g transform="translate(0 505)">
