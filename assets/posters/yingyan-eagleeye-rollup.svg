<svg xmlns="http://www.w3.org/2000/svg" width="80cm" height="200cm" viewBox="0 0 2400 6000" fill="none" role="img" aria-labelledby="poster-title poster-desc">
  <title id="poster-title">鹰眼 EAGLEEYE 医保基金稽核智能体易拉宝海报</title>
  <desc id="poster-desc">80cm by 200cm rollup poster for EagleEye, a medical insurance audit AI agent.</desc>
  <defs>
    <pattern id="dot-grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="1.8" fill="#002FA7" opacity="0.09"/>
    </pattern>
    <pattern id="fine-grid" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M120 0H0V120" stroke="#002FA7" stroke-width="1" opacity="0.045"/>
    </pattern>
    <linearGradient id="logo-bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061829"/>
      <stop offset="1" stop-color="#002FA7"/>
    </linearGradient>
    <style>
      .font { font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Noto Sans SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif; }
      .latin { font-family: Inter, "Helvetica Neue", Arial, sans-serif; }
      .mono { font-family: "SF Mono", "DM Mono", "Roboto Mono", Menlo, Consolas, monospace; }
      .ink { fill: #0A0A0A; }
      .muted { fill: #4A4A4A; }
      .blue { fill: #002FA7; }
      .paper { fill: #FAFAF8; }
      .rule { stroke: #002FA7; stroke-width: 3; opacity: 0.92; }
      .hair { stroke: #002FA7; stroke-width: 2; opacity: 0.18; }
      .icon { stroke: #002FA7; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
      .icon-thin { stroke: #002FA7; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="2400" height="6000" fill="#FAFAF8"/>
  <rect width="2400" height="6000" fill="url(#dot-grid)"/>
  <rect x="0" y="3150" width="2400" height="2850" fill="url(#fine-grid)" opacity="0.75"/>

  <!-- Safe margin guide: content stays inside x=180..2220. -->

  <!-- Brand area -->
