      <text x="42" y="64" class="blue mono" font-size="26" font-weight="700">TRUST GATE</text>
      <text x="42" y="126" class="ink" font-size="34" font-weight="700">疑点输出前，先过三道门</text>
      <g transform="translate(42 172)">
