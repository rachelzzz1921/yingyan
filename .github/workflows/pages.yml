name: Deploy GitHub Pages Preview

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: prototype/app/package-lock.json

      - name: Install and build rules
        working-directory: prototype/app
        run: npm ci && npm run build:rules

      - name: Build static preview
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/build-github-pages.mjs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
