name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  gate:
    name: Build rules and run YHF gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: prototype/app/package-lock.json

      - name: Install prototype dependencies
        working-directory: prototype/app
        run: npm ci

      - name: Build rules
        working-directory: prototype/app
        run: npm run build:rules

      - name: Run YHF strict gate
        run: bash yhf/run.sh --strict
