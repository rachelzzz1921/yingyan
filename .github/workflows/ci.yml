name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  gate:
    name: Build rules and run YHF gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: prototype/app/package-lock.json

      - name: Install prototype dependencies
        working-directory: prototype/app
        run: npm ci

      - name: Build rules
        working-directory: prototype/app
        run: npm run build:rules

      - name: Run YHF strict gate
        run: bash yhf/run.sh --strict

      - name: Verify iter-36 (eval_draft + boundary bucket) through iter-29
        run: |
          node scripts/verify-iter36.js
          node scripts/verify-iter35.js
          node scripts/verify-iter34.js
          node scripts/verify-iter33.js
          cd prototype/app
          node server.js &
          SERVER_PID=$!
          trap "kill $SERVER_PID 2>/dev/null || true" EXIT
          sleep 3
          node ../../scripts/verify-iter32.js
          node ../../scripts/verify-iter31.js
          node ../../scripts/verify-iter30.js
          node ../../scripts/verify-iter29.js
